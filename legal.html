<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal | Privacy & Terms</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Shared System Theme */
        body {
            background-color: #0f172a;
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Custom Scrollbar for the legal text area */
        .legal-content::-webkit-scrollbar { width: 8px; }
        .legal-content::-webkit-scrollbar-track { background: #1e293b; }
        .legal-content::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .legal-content::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>

    <script src="/assets/js/inject.js" defer></script>
</head>
<body class="text-slate-100 min-h-screen flex flex-col font-sans antialiased">

    <nav class="p-6">
        <a href="/" class="text-slate-400 hover:text-white transition-colors flex items-center gap-2 w-fit">
            <i class="fa-solid fa-arrow-left"></i> <span>Home</span>
        </a>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto w-full p-4 md:p-8 mb-12">
        
        <div class="mb-8 text-center">
            <h1 class="text-4xl font-bold mb-8 tracking-tight">Legal Center</h1>
            
            <div class="inline-flex bg-slate-800 p-1 rounded-xl border border-slate-700 shadow-lg">
                <button onclick="switchTab('privacy')" id="tab-privacy" class="px-6 py-2 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-400 hover:text-white">
                    Privacy Policy
                </button>
                <button onclick="switchTab('tos')" id="tab-tos" class="px-6 py-2 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-400 hover:text-white">
                    Terms of Service
                </button>
            </div>
        </div>

        <div id="legal-container" class="bg-slate-900/80 backdrop-blur border border-slate-700 rounded-2xl p-8 md:p-12 shadow-2xl min-h-[400px]">
            <div class="text-center mt-20 text-slate-500 animate-pulse">Loading legal documents...</div>
        </div>

        </main>

    <script>
        const container = document.getElementById('legal-container');
        const tabPrivacy = document.getElementById('tab-privacy');
        const tabTos = document.getElementById('tab-tos');

        // Check URL for default tab, default to 'privacy'
        const urlParams = new URLSearchParams(window.location.search);
        const initialTab = urlParams.get('doc') || 'privacy';

        // Initialize
        switchTab(initialTab);

        async function switchTab(type) {
            // 1. Update Buttons Visual State
            if (type === 'privacy') {
                setActive(tabPrivacy);
                setInactive(tabTos);
                // Update URL without reload
                window.history.replaceState(null, null, "?doc=privacy");
            } else {
                setActive(tabTos);
                setInactive(tabPrivacy);
                window.history.replaceState(null, null, "?doc=tos");
            }

            // 2. Fetch Data
            await loadContent(type);
        }

        function setActive(btn) {
            btn.classList.add('bg-blue-600', 'text-white', 'shadow-md');
            btn.classList.remove('text-slate-400', 'hover:text-white');
        }

        function setInactive(btn) {
            btn.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
            btn.classList.add('text-slate-400', 'hover:text-white');
        }

        async function loadContent(type) {
            try {
                // Fade out slightly
                container.style.opacity = '0.5';

                const response = await fetch(`/assets/data/legal/${type}.json`);
                if (!response.ok) throw new Error("Document not found");
                
                const data = await response.json();

                // Render Sections
                let sectionsHtml = '';
                data.sections.forEach(section => {
                    sectionsHtml += `
                        <div class="mb-8">
                            <h3 class="text-xl font-bold text-white mb-3">${section.heading}</h3>
                            <div class="text-slate-400 leading-relaxed text-sm md:text-base space-y-4">
                                ${section.content} 
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = `
                    <div class="fade-in">
                        <div class="border-b border-slate-700 pb-6 mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                            <div>
                                <h2 class="text-3xl font-bold text-white">${data.title}</h2>
                                <p class="text-slate-500 text-sm mt-2">Effective Date: ${data.effectiveDate}</p>
                            </div>
                            <div class="text-xs font-mono text-blue-400 bg-blue-900/20 px-3 py-1 rounded border border-blue-500/30">
                                VER: ${data.version}
                            </div>
                        </div>
                        
                        <div class="legal-content">
                            ${sectionsHtml}
                        </div>

                        <div class="mt-12 pt-8 border-t border-slate-800 text-center text-slate-500 text-xs">
                            If you have questions about this ${type === 'privacy' ? 'policy' : 'agreement'}, please contact us at <a href="mailto:${data.contactEmail}" class="text-blue-400 hover:underline">${data.contactEmail}</a>.
                        </div>
                    </div>
                `;

            } catch (error) {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <i class="fa-solid fa-triangle-exclamation text-4xl text-amber-500 mb-4"></i>
                        <h3 class="text-xl font-bold text-white">Error Loading Document</h3>
                        <p class="text-slate-500 mt-2">Could not retrieve ${type}.json</p>
                    </div>
                `;
            } finally {
                container.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
