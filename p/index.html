<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mason</title>
    <meta name="description" content="Mason's links.">
    <meta name="theme-color" content="#07111d">
    <link rel="icon" type="image/png" sizes="128x128" href="/public_assets/site_branding/site_icons/128/logged_out.png">
    <link rel="icon" type="image/png" sizes="256x256" href="/public_assets/site_branding/site_icons/256/logged_out.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/public_assets/site_branding/site_icons/512/logged_out.png">
    <link rel="apple-touch-icon" href="/public_assets/site_branding/site_icons/256/logged_out.png">
    <meta property="og:title" content="Mason">
    <meta property="og:description" content="Mason's links.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.mas0ng.com/p/">
    <meta property="og:image" content="https://www.mas0ng.com/public_assets/site_branding/site_icons/800/logged_out.png">
    <meta property="og:image:width" content="800">
    <meta property="og:image:height" content="800">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Mason">
    <meta name="twitter:description" content="Mason's links.">
    <meta name="twitter:image" content="https://www.mas0ng.com/public_assets/site_branding/site_icons/800/logged_out.png">
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05080d;
        color: #f4f8ff;
        --bg: #05080d;
        --panel: rgba(10, 16, 25, 0.78);
        --panel-strong: rgba(12, 22, 35, 0.94);
        --line: rgba(190, 225, 255, 0.16);
        --line-strong: rgba(190, 225, 255, 0.36);
        --muted: #8fa2b7;
        --blue: #79c7ff;
        --blue-strong: #38a7ff;
        --cyan: #b9ecff;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: transparent;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(rgba(190, 225, 255, 0.052) 1px, transparent 1px),
          linear-gradient(90deg, rgba(190, 225, 255, 0.052) 1px, transparent 1px),
          linear-gradient(120deg, rgba(121, 199, 255, 0.18), transparent 26%, rgba(255, 255, 255, 0.05) 56%, transparent 78%),
          radial-gradient(circle at 50% -20%, rgba(121, 199, 255, 0.2), transparent 34%),
          linear-gradient(180deg, #07111d 0%, var(--bg) 48%, #030508 100%);
        background-size: 42px 42px, 42px 42px, 100% 100%, 100% 100%, 100% 100%;
      }

      a,
      button {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        cursor: pointer;
      }

      .page {
        position: relative;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
      }

      .page::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(115deg, transparent 0 43%, rgba(121, 199, 255, 0.14) 43.2%, transparent 43.8%),
          linear-gradient(115deg, transparent 0 58%, rgba(246, 251, 255, 0.09) 58.2%, transparent 58.7%);
        opacity: 0.7;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 4;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid rgba(190, 225, 255, 0.12);
        background: rgba(5, 8, 13, 0.72);
        padding: 14px clamp(18px, 4vw, 34px);
        backdrop-filter: blur(18px);
      }

      .brand {
        color: #f4f8ff;
        font-size: 1rem;
        font-weight: 800;
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .nav-link,
      .login {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 14px;
        font-size: 0.92rem;
        font-weight: 700;
        transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
      }

      .nav-link {
        color: var(--muted);
        background: rgba(255, 255, 255, 0.02);
      }

      .login {
        color: #06101b;
        background: linear-gradient(135deg, #e5f4ff, #78c9ff);
        border-color: rgba(216, 236, 255, 0.68);
      }

      .nav-link:hover,
      .login:hover {
        border-color: var(--line-strong);
        transform: translateY(-1px);
      }

      main {
        position: relative;
        width: min(100%, 780px);
        margin: 0 auto;
        padding: clamp(44px, 8vh, 76px) 18px 124px;
      }

      .hero {
        position: relative;
        min-height: clamp(240px, 32vw, 330px);
        display: grid;
        align-content: end;
        border: 1px solid rgba(190, 225, 255, 0.24);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(121, 199, 255, 0.2), transparent 44%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.025)),
          var(--panel);
        padding: clamp(30px, 7vw, 62px);
        box-shadow:
          0 34px 110px rgba(0, 0, 0, 0.48),
          0 0 0 1px rgba(121, 199, 255, 0.06) inset,
          inset 0 1px 0 rgba(255, 255, 255, 0.07);
        overflow: hidden;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent 22%, transparent 78%, rgba(121, 199, 255, 0.1)),
          repeating-linear-gradient(90deg, transparent 0 26px, rgba(255, 255, 255, 0.025) 26px 27px);
        opacity: 0.72;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -10% -34% 12%;
        height: 170px;
        background: linear-gradient(90deg, transparent, rgba(121, 199, 255, 0.42), rgba(246, 251, 255, 0.24), transparent);
        transform: rotate(-7deg);
      }

      .hero h1::after {
        content: "";
        position: absolute;
        left: 0.04em;
        right: 0.04em;
        bottom: -0.08em;
        height: 2px;
        background: linear-gradient(90deg, rgba(121, 199, 255, 0.9), transparent);
        opacity: 0.82;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        position: relative;
        z-index: 1;
        width: fit-content;
        background: linear-gradient(92deg, #ffffff 0%, var(--cyan) 28%, #45adff 68%, #f6fbff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-size: clamp(4.8rem, 18vw, 10.8rem);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 0.82;
        text-shadow: 0 0 46px rgba(69, 173, 255, 0.3);
      }

      .links {
        display: grid;
        gap: 13px;
        margin-top: 16px;
      }

      .link-card {
        position: relative;
        min-height: 82px;
        display: grid;
        grid-template-columns: 54px minmax(0, 1fr) 32px;
        align-items: center;
        gap: 16px;
        border: 1px solid rgba(190, 225, 255, 0.18);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.095), transparent 42%),
          linear-gradient(90deg, rgba(121, 199, 255, 0.08), transparent 44%),
          var(--panel-strong);
        padding: 14px 20px 14px 16px;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.055);
        transition: border-color 180ms ease, background 180ms ease, transform 180ms ease, box-shadow 180ms ease;
        overflow: hidden;
      }

      .link-card::before {
        content: "";
        position: absolute;
        inset: 12px auto 12px 0;
        width: 2px;
        background: linear-gradient(180deg, transparent, rgba(121, 199, 255, 0.86), transparent);
        opacity: 0.7;
      }

      .link-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(115deg, transparent 0 52%, rgba(255, 255, 255, 0.1) 52.4%, transparent 54%);
        opacity: 0;
        transition: opacity 180ms ease;
      }

      .link-card:hover {
        border-color: rgba(121, 199, 255, 0.72);
        background:
          linear-gradient(135deg, rgba(121, 199, 255, 0.2), transparent 48%),
          linear-gradient(90deg, rgba(121, 199, 255, 0.12), transparent 44%),
          var(--panel-strong);
        box-shadow: 0 22px 54px rgba(0, 0, 0, 0.36), 0 0 0 1px rgba(121, 199, 255, 0.1) inset;
        transform: translateY(-3px);
      }

      .link-card:hover::after {
        opacity: 1;
      }

      .icon-shell {
        position: relative;
        z-index: 1;
        width: 54px;
        height: 54px;
        display: grid;
        place-items: center;
      }

      .social-icon {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.3));
      }

      .link-text {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .link-card strong {
        min-width: 0;
        color: #f6fbff;
        font-size: 1.18rem;
        font-weight: 900;
        overflow-wrap: anywhere;
      }

      .link-card small {
        color: #9eb3c8;
        font-size: 0.86rem;
        font-weight: 800;
      }

      .arrow {
        position: relative;
        z-index: 1;
        display: inline-grid;
        place-items: center;
        width: 32px;
        height: 32px;
        border: 1px solid rgba(190, 225, 255, 0.18);
        border-radius: 999px;
        color: var(--blue);
        font-size: 1.1rem;
        font-weight: 900;
        background: rgba(255, 255, 255, 0.035);
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .link-card:hover .arrow {
        border-color: rgba(121, 199, 255, 0.48);
        background: rgba(121, 199, 255, 0.1);
        transform: translateX(2px);
      }

      .privacy {
        position: fixed;
        left: 18px;
        right: 18px;
        bottom: 18px;
        z-index: 5;
        display: none;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: rgba(5, 8, 13, 0.94);
        padding: 14px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(16px);
      }

      .privacy[data-open="true"] {
        display: grid;
      }

      .privacy p {
        max-width: none;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 600;
        line-height: 1.5;
      }

      .privacy a {
        color: #f4f8ff;
        font-weight: 800;
        text-decoration: underline;
        text-decoration-color: rgba(121, 199, 255, 0.5);
        text-underline-offset: 4px;
      }

      .privacy-actions {
        display: flex;
        justify-content: flex-end;
      }

      .privacy button {
        min-height: 42px;
        border: 1px solid rgba(216, 236, 255, 0.68);
        border-radius: 6px;
        background: linear-gradient(135deg, #e5f4ff, #78c9ff);
        color: #06101b;
        padding: 0 14px;
        font-weight: 850;
      }

      .external-modal {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
        place-items: center;
        padding: 18px;
        background: rgba(1, 4, 8, 0.72);
        backdrop-filter: blur(16px);
      }

      .external-modal[data-open="true"] {
        display: grid;
      }

      .external-panel {
        width: min(100%, 440px);
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(121, 199, 255, 0.12), transparent 45%),
          rgba(8, 14, 23, 0.98);
        padding: 20px;
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.58);
      }

      .external-code {
        color: var(--blue);
        font-size: 0.8rem;
        font-weight: 850;
      }

      .external-panel h2 {
        margin: 10px 0 0;
        color: #f6fbff;
        font-size: 1.4rem;
        line-height: 1.12;
      }

      .external-panel p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
        font-weight: 650;
        line-height: 1.55;
      }

      .external-host {
        display: block;
        margin-top: 14px;
        border: 1px solid rgba(190, 225, 255, 0.18);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.04);
        color: #f4f8ff;
        padding: 12px;
        font-size: 0.95rem;
        font-weight: 850;
        overflow-wrap: anywhere;
      }

      .external-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 18px;
      }

      .external-actions button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 14px;
        color: #f4f8ff;
        background: rgba(255, 255, 255, 0.035);
        font-weight: 850;
      }

      .external-actions [data-external-continue] {
        color: #06101b;
        background: linear-gradient(135deg, #e5f4ff, #78c9ff);
        border-color: rgba(216, 236, 255, 0.68);
      }

      .intro-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        width: 100vw;
        height: 100vh;
        display: none;
        align-items: center;
        justify-content: center;
        background: #000000;
        overflow: hidden;
        pointer-events: none;
        user-select: none;
      }

      .intro-overlay[data-active="true"] {
        display: flex;
      }

      .intro-overlay.is-revealing {
        background: transparent !important;
      }

      .intro-stage {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .spinner-container {
        position: absolute;
        z-index: 20;
        width: 16rem;
        height: 16rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .spinner-core {
        position: absolute;
        width: 80%;
        height: 80%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .spinner-core svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .reveal-screen {
        position: fixed;
        inset: 0;
        z-index: 10;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        opacity: 0;
      }

      .reveal-hole {
        transform-box: fill-box;
        transform-origin: center;
      }

      .is-revealing .reveal-screen {
        opacity: 1;
      }

      .is-revealing .reveal-hole {
        animation: revealHole 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes sinSpin {
        0% {
          transform: rotate(0deg) scale(0.9);
          filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
          stroke-width: 4;
        }
        50% {
          transform: rotate(180deg) scale(1.1);
          filter: drop-shadow(0 0 30px rgba(255, 255, 255, 1));
          stroke-width: 8;
        }
        100% {
          transform: rotate(360deg) scale(0.9);
          filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
          stroke-width: 4;
        }
      }

      @keyframes burstContainer {
        0% { transform: scale(1) rotate(0deg); opacity: 1; }
        30% { transform: scale(0.6) rotate(-45deg); opacity: 1; }
        60% { transform: scale(4) rotate(20deg); opacity: 1; }
        100% { transform: scale(60) rotate(90deg); opacity: 0; }
      }

      @keyframes burstPoly {
        0% { filter: drop-shadow(0 0 20px rgba(255,255,255,0.8)); stroke-width: 8; stroke: #ffffff; }
        30% { stroke: #3b82f6; filter: drop-shadow(0 0 40px rgba(59, 130, 246, 1)); stroke-width: 16; }
        60% { stroke: #a855f7; filter: drop-shadow(0 0 60px rgba(168, 85, 247, 1)); stroke-width: 4; }
        100% { stroke: #ec4899; filter: drop-shadow(0 0 100px rgba(236, 72, 153, 0)); stroke-width: 0.5; }
      }

      @keyframes revealHole {
        0% { transform: scale(1) rotate(0deg); opacity: 1; }
        30% { transform: scale(0.6) rotate(-45deg); opacity: 1; }
        60% { transform: scale(4) rotate(20deg); opacity: 1; }
        100% { transform: scale(60) rotate(90deg); opacity: 1; }
      }

      .animate-sin-spin {
        animation: sinSpin 4s cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite;
        animation-delay: var(--intro-phase-delay, 0ms);
        transform-origin: center;
      }

      .animate-burst-container {
        animation: burstContainer 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      .animate-burst-poly {
        animation: burstPoly 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
        stroke-linejoin: round;
        stroke-linecap: round;
      }

      @media (max-width: 620px) {
        header {
          gap: 12px;
          padding-inline: 14px;
        }

        .brand {
          font-size: 0.96rem;
        }

        .nav-link,
        .login {
          min-height: 38px;
          padding-inline: 10px;
          font-size: 0.86rem;
        }

        main {
          padding-top: 32px;
        }

        .hero {
          padding: 26px 18px;
          min-height: 220px;
        }

        h1 {
          font-size: clamp(4.2rem, 22vw, 6.7rem);
        }

        .link-card {
          min-height: 74px;
          grid-template-columns: 46px minmax(0, 1fr) 28px;
          padding: 14px;
        }

        .icon-shell {
          width: 46px;
          height: 46px;
        }

        .social-icon {
          width: 100%;
          height: 100%;
        }

        .privacy {
          grid-template-columns: 1fr;
        }

        .external-actions {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <a class="brand" href="/p/index.html">Mason</a>
        <div class="nav-actions">
          <a class="nav-link" href="/p/privacy.html">privacy</a>
          <a class="login" href="/auth/login?return_to=%2Fdash%2F">login</a>
        </div>
      </header>

      <main>
        <section class="hero" aria-label="Mason">
          <h1>Mason</h1>
        </section>

        <section class="links" aria-label="Links" data-social-links></section>
      </main>
    </div>

    <section class="privacy" data-privacy-banner aria-live="polite">
      <p>We value your privacy. This page does not load third-party tracking scripts. Read the <a href="/p/privacy.html">privacy policy</a>.</p>
      <div class="privacy-actions">
        <button type="button" data-privacy-choice="seen">got it</button>
      </div>
    </section>

    <div class="external-modal" data-external-modal aria-hidden="true">
      <section class="external-panel" role="dialog" aria-modal="true" aria-labelledby="external-title">
        <div class="external-code">external site</div>
        <h2 id="external-title">You are leaving mas0ng.com</h2>
        <p>This link opens another website. Check the host before continuing.</p>
        <span class="external-host" data-external-host></span>
        <div class="external-actions">
          <button type="button" data-external-cancel>stay here</button>
          <button type="button" data-external-continue>continue</button>
        </div>
      </section>
    </div>

    <div class="intro-overlay" id="intro-overlay" aria-hidden="true">
      <svg id="reveal-screen" class="reveal-screen">
        <defs>
          <mask id="reveal-mask">
            <rect x="0" y="0" width="100%" height="100%" fill="white"></rect>
            <polygon id="reveal-hole" class="reveal-hole" fill="black"></polygon>
          </mask>
        </defs>
        <rect x="0" y="0" width="100%" height="100%" fill="#000000" mask="url(#reveal-mask)"></rect>
      </svg>

      <div class="intro-stage">
        <div id="spinner-container" class="spinner-container">
          <div class="spinner-core animate-sin-spin">
            <svg viewBox="0 0 100 100" aria-hidden="true">
              <polygon points="50,10 88,38 74,82 26,82 12,38" fill="none" stroke="#ffffff" stroke-linejoin="round" stroke-linecap="round" class="poly-shape"></polygon>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <script>
      const banner = document.querySelector("[data-privacy-banner]");
      const overlay = document.querySelector("#intro-overlay");
      const externalModal = document.querySelector("[data-external-modal]");
      const externalHost = document.querySelector("[data-external-host]");
      const externalCancel = document.querySelector("[data-external-cancel]");
      const externalContinue = document.querySelector("[data-external-continue]");
      const socialLinksContainer = document.querySelector("[data-social-links]");
      const socials = [
        {
          name: "Instagram",
          username: "@mas0ngi",
          url: "https://www.instagram.com/mas0ngi",
          icon: "/public_assets/social_icons/instagram.svg"
        },
        {
          name: "TikTok",
          username: "@mas0ng",
          url: "https://www.tiktok.com/@mas0ng",
          icon: "/public_assets/social_icons/tiktok.svg"
        },
        {
          name: "Snapchat",
          username: "mas0ng",
          url: "https://www.snapchat.com/add/mas0ng",
          icon: "/public_assets/social_icons/snapchat.svg"
        }
      ];
      let isRevealing = false;
      let pendingExternalUrl = "";

      bootPage();
      renderSocialLinks();

      window.addEventListener("resize", () => {
        if (isRevealing) positionRevealHole();
      });

      document.addEventListener("click", (event) => {
        const externalLink = event.target.closest("[data-external-link]");
        if (externalLink) {
          event.preventDefault();
          openExternalWarning(externalLink.href);
          return;
        }

        const button = event.target.closest("[data-privacy-choice]");
        if (!button) return;
        try {
          localStorage.setItem("mas0ng_privacy_choice", "seen");
        } catch {}
        banner.dataset.open = "false";
      });

      externalCancel.addEventListener("click", closeExternalWarning);

      externalContinue.addEventListener("click", () => {
        if (!pendingExternalUrl) return;
        const nextUrl = pendingExternalUrl;
        closeExternalWarning();
        window.open(nextUrl, "_blank", "noopener,noreferrer");
      });

      externalModal.addEventListener("click", (event) => {
        if (event.target === externalModal) closeExternalWarning();
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeExternalWarning();
      });

      function bootPage() {
        const params = new URLSearchParams(window.location.search);
        const shouldPlayIntro = params.get("from") === "index";
        const introState = readIntroState(params);

        if (shouldPlayIntro) {
          ["from", "phase", "rotation", "scale", "size"].forEach((key) => params.delete(key));
          const nextQuery = params.toString();
          const cleanUrl = `${window.location.pathname}${nextQuery ? `?${nextQuery}` : ""}${window.location.hash}`;
          window.history.replaceState({}, "", cleanUrl);
          overlay.dataset.active = "true";
          applyIntroState(introState);
          window.setTimeout(() => {
            triggerIntroReveal();
          }, 1000);
          return;
        }

        overlay.remove();
        showPrivacyBanner();
      }

      function readIntroState(params) {
        return {
          phase: clampNumber(Number(params.get("phase")), 0, 3999, 0),
          rotation: clampNumber(Number(params.get("rotation")), 0, 359, 0),
          scale: clampNumber(Number(params.get("scale")), 0.75, 1.25, 0.9),
          size: clampNumber(Number(params.get("size")), 96, 420, 256)
        };
      }

      function applyIntroState(state) {
        const spinnerContainer = document.querySelector("#spinner-container");
        const movingWrapper = spinnerContainer.querySelector(".animate-sin-spin");
        spinnerContainer.style.width = `${state.size}px`;
        spinnerContainer.style.height = `${state.size}px`;
        movingWrapper.style.setProperty("--intro-phase-delay", `-${Math.round(state.phase)}ms`);
        movingWrapper.style.transform = `rotate(${state.rotation}deg) scale(${state.scale})`;
        movingWrapper.getBoundingClientRect();
        movingWrapper.style.transform = "";
      }

      function clampNumber(value, min, max, fallback) {
        if (!Number.isFinite(value)) return fallback;
        return Math.min(max, Math.max(min, value));
      }

      function renderSocialLinks() {
        socialLinksContainer.replaceChildren(...socials.map((social) => {
          const link = document.createElement("a");
          link.className = "link-card";
          link.href = social.url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.dataset.externalLink = "";

          const iconShell = document.createElement("span");
          iconShell.className = "icon-shell";
          iconShell.setAttribute("aria-hidden", "true");

          const icon = document.createElement("img");
          icon.className = "social-icon";
          icon.src = social.icon;
          icon.alt = "";
          icon.width = 46;
          icon.height = 46;
          iconShell.append(icon);

          const text = document.createElement("span");
          text.className = "link-text";

          const name = document.createElement("strong");
          name.textContent = social.name;

          const username = document.createElement("small");
          username.textContent = social.username;

          const arrow = document.createElement("span");
          arrow.className = "arrow";
          arrow.setAttribute("aria-hidden", "true");
          arrow.innerHTML = "&rsaquo;";

          text.append(name, username);
          link.append(iconShell, text, arrow);
          return link;
        }));
      }

      function openExternalWarning(url) {
        let host = "external site";
        try {
          host = new URL(url).hostname.replace(/^www\./, "");
        } catch {}
        pendingExternalUrl = url;
        externalHost.textContent = host;
        externalModal.dataset.open = "true";
        externalModal.setAttribute("aria-hidden", "false");
        externalContinue.focus();
      }

      function closeExternalWarning() {
        pendingExternalUrl = "";
        externalModal.dataset.open = "false";
        externalModal.setAttribute("aria-hidden", "true");
      }

      function triggerIntroReveal() {
        if (isRevealing) return;
        isRevealing = true;

        const spinnerContainer = document.querySelector("#spinner-container");
        const polygons = document.querySelectorAll(".poly-shape");
        const movingWrapper = spinnerContainer.querySelector(".animate-sin-spin");
        if (movingWrapper) movingWrapper.classList.remove("animate-sin-spin");

        positionRevealHole();
        overlay.classList.add("is-revealing");
        spinnerContainer.classList.add("animate-burst-container");
        polygons.forEach((poly) => {
          poly.classList.add("animate-burst-poly");
        });

        window.setTimeout(() => {
          overlay.remove();
          showPrivacyBanner();
        }, 1600);
      }

      function positionRevealHole() {
        const screen = document.querySelector("#reveal-screen");
        const hole = document.querySelector("#reveal-hole");
        const width = window.innerWidth || 1;
        const height = window.innerHeight || 1;
        const base = 204;
        const centerX = width / 2;
        const centerY = height / 2;
        const points = [
          [50, 10],
          [88, 38],
          [74, 82],
          [26, 82],
          [12, 38]
        ].map(([x, y]) => {
          const nextX = centerX + ((x - 50) / 100) * base;
          const nextY = centerY + ((y - 50) / 100) * base;
          return `${nextX},${nextY}`;
        }).join(" ");

        screen.setAttribute("viewBox", `0 0 ${width} ${height}`);
        hole.setAttribute("points", points);
      }

      function showPrivacyBanner() {
        let choice = "";
        try {
          choice = localStorage.getItem("mas0ng_privacy_choice") || "";
        } catch {}
        if (!choice) banner.dataset.open = "true";
      }
    </script>
  </body>
</html>
