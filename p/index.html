    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #ffffff;
        color: #101418;
        --bg: #ffffff;
        --panel: #ffffff;
        --panel-strong: #ffffff;
        --line: #e0e3e7;
        --line-strong: #c7d8f8;
        --muted: #5f6368;
        --blue: #1a73e8;
        --blue-strong: #174ea6;
        --blue-soft: #e8f0fe;
        --green-soft: #e6f4ea;
        --yellow-soft: #fef7e0;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: transparent;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(rgba(26, 115, 232, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(26, 115, 232, 0.05) 1px, transparent 1px),
          linear-gradient(135deg, rgba(232, 240, 254, 0.95), rgba(255, 255, 255, 0.75) 44%, rgba(230, 244, 234, 0.72)),
          #ffffff;
        background-size: 42px 42px, 42px 42px, 100% 100%, 100% 100%, 100% 100%;
      }

      a,
      button {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        cursor: pointer;
      }

      .page {
        position: relative;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
      }

      .page::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(115deg, transparent 0 43%, rgba(26, 115, 232, 0.08) 43.2%, transparent 43.8%),
          linear-gradient(115deg, transparent 0 58%, rgba(19, 115, 51, 0.06) 58.2%, transparent 58.7%);
        opacity: 0.9;
      }

      main {
        position: relative;
        width: min(100%, 980px);
        margin: 0 auto;
        padding: clamp(28px, 6vh, 58px) 18px 124px;
      }

      .profile {
        border: 1px solid #dfe8f8;
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(232, 240, 254, 0.98), rgba(230, 244, 234, 0.88) 55%, rgba(254, 247, 224, 0.82)),
          var(--panel);
        box-shadow: 0 18px 45px rgba(32, 45, 64, 0.10);
        overflow: hidden;
      }

      .profile-cover {
        min-height: 150px;
        background:
          linear-gradient(120deg, rgba(26, 115, 232, 0.24), transparent 32%, rgba(255, 255, 255, 0.7) 54%, transparent 78%),
          repeating-linear-gradient(90deg, transparent 0 26px, rgba(26, 115, 232, 0.06) 26px 27px),
          linear-gradient(135deg, #e8f0fe, #ffffff);
      }

      .profile-body {
        display: grid;
        grid-template-columns: 132px minmax(0, 1fr);
        gap: 26px;
        padding: 0 clamp(18px, 4vw, 34px) 28px;
      }

      .avatar-ring {
        width: 132px;
        height: 132px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: linear-gradient(135deg, #ffffff, #9edaff 34%, #45adff 70%, #f6fbff);
        padding: 4px;
        transform: translateY(-46px);
        box-shadow: 0 18px 42px rgba(32, 45, 64, 0.18);
      }

      .avatar {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        border: 7px solid #ffffff;
        border-radius: inherit;
        background:
          linear-gradient(135deg, rgba(121, 199, 255, 0.24), transparent 50%),
          #e8f0fe;
        color: #101418;
        font-size: 4rem;
        font-weight: 950;
        line-height: 1;
      }

      .profile-info {
        min-width: 0;
        padding-top: 24px;
      }

      .profile-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        color: #101418;
        font-size: clamp(2.4rem, 7vw, 5.4rem);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 0.92;
      }

      .content-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 14px;
        margin-top: 16px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #30353b;
        font-size: 0.86rem;
        font-weight: 850;
        letter-spacing: 0;
      }

      .links {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .link-card {
        position: relative;
        min-height: 166px;
        display: grid;
        align-content: space-between;
        border: 1px solid #dfe3ea;
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(232, 240, 254, 0.95), transparent 42%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.86), transparent 60%),
          var(--panel-strong);
        padding: 16px;
        box-shadow: 0 14px 34px rgba(32, 45, 64, 0.08);
        transition: border-color 180ms ease, background 180ms ease, transform 180ms ease, box-shadow 180ms ease;
        overflow: hidden;
      }

      .link-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(115deg, transparent 0 52%, rgba(255, 255, 255, 0.1) 52.4%, transparent 54%);
        opacity: 0;
        transition: opacity 180ms ease;
      }

      .link-card:hover {
        border-color: #c7d8f8;
        box-shadow: 0 18px 44px rgba(32, 45, 64, 0.12);
        transform: translateY(-3px);
      }

      .link-card:hover::after {
        opacity: 1;
      }

      .icon-shell {
        position: relative;
        z-index: 1;
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
      }

      .social-icon {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.3));
      }

      .link-text {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 5px;
        min-width: 0;
      }

      .link-card strong {
        min-width: 0;
        color: #101418;
        font-size: 1.14rem;
        font-weight: 900;
        overflow-wrap: anywhere;
      }

      .link-card small {
        color: #5f6368;
        font-size: 0.86rem;
        font-weight: 800;
      }

      .arrow {
        position: absolute;
        right: 14px;
        bottom: 14px;
        z-index: 1;
        display: inline-grid;
        place-items: center;
        width: 32px;
        height: 32px;
        border: 1px solid #dfe3ea;
        border-radius: 8px;
        color: var(--blue);
        font-size: 1.1rem;
        font-weight: 900;
        background: #f8fbff;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .link-card:hover .arrow {
        border-color: rgba(121, 199, 255, 0.48);
        background: rgba(121, 199, 255, 0.1);
        transform: translateX(2px);
      }

      .privacy {
        position: fixed;
        left: 18px;
        right: 18px;
        bottom: 18px;
        z-index: 5;
        display: none;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.96);
        padding: 14px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(16px);
      }

      .privacy[data-open="true"] {
        display: grid;
      }

      .privacy p {
        max-width: none;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 600;
        line-height: 1.5;
      }

      .privacy a {
        color: #0b57d0;
        font-weight: 800;
        text-decoration: underline;
        text-decoration-color: rgba(121, 199, 255, 0.5);
        text-underline-offset: 4px;
      }

      .privacy-actions {
        display: flex;
        justify-content: flex-end;
      }

      .privacy button {
        min-height: 42px;
        border: 1px solid rgba(216, 236, 255, 0.68);
        border-radius: 6px;
        background: #101418;
        color: #ffffff;
        padding: 0 14px;
        font-weight: 850;
      }

      .external-modal {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
        place-items: center;
        padding: 18px;
        background: rgba(16, 20, 24, 0.44);
        backdrop-filter: blur(16px);
      }

      .external-modal[data-open="true"] {
        display: grid;
      }

      .external-panel {
        width: min(100%, 440px);
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(232, 240, 254, 0.98), transparent 45%),
          #ffffff;
        padding: 20px;
        box-shadow: 0 24px 72px rgba(32, 45, 64, 0.22);
      }

      .external-code {
        color: var(--blue);
        font-size: 0.8rem;
        font-weight: 850;
      }

      .external-panel h2 {
        margin: 10px 0 0;
        color: #101418;
        font-size: 1.4rem;
        line-height: 1.12;
      }

      .external-panel p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
        font-weight: 650;
        line-height: 1.55;
      }

      .external-host {
        display: block;
        margin-top: 14px;
        border: 1px solid #dfe3ea;
        border-radius: 6px;
        background: #f8fbff;
        color: #101418;
        padding: 12px;
        font-size: 0.95rem;
        font-weight: 850;
        overflow-wrap: anywhere;
      }

      .external-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 18px;
      }

      .external-actions button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 14px;
        color: #101418;
        background: #ffffff;
        font-weight: 850;
      }

      .external-actions [data-external-continue] {
        color: #ffffff;
        background: #101418;
        border-color: #101418;
      }

      .intro-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        width: 100vw;
        height: 100vh;
        display: none;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        overflow: hidden;
        pointer-events: none;
        user-select: none;
      }

      .intro-overlay[data-active="true"] {
        display: flex;
      }

      .intro-overlay.is-revealing {
        background: transparent !important;
      }

      .intro-stage {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .intro-status {
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: 24px;
        z-index: 30;
        margin: 0;
        color: rgba(15, 23, 42, 0.58);
        font-size: 0.78rem;
        font-weight: 700;
        line-height: 1.5;
        text-align: center;
        overflow-wrap: anywhere;
      }

      .spinner-container {
        position: absolute;
        z-index: 20;
        width: 16rem;
        height: 16rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .spinner-core {
        position: absolute;
        width: 80%;
        height: 80%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .spinner-core svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .reveal-screen {
        position: fixed;
        inset: 0;
        z-index: 10;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        opacity: 0;
      }

      .reveal-hole {
        transform-box: fill-box;
        transform-origin: center;
      }

      .is-revealing .reveal-screen {
        opacity: 1;
      }

      .is-revealing .reveal-hole {
        animation: revealHole 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes sinSpin {
        0% {
          transform: rotate(0deg) scale(0.9);
          filter: drop-shadow(0 0 10px rgba(26, 115, 232, 0.22));
          stroke-width: 4;
        }
        50% {
          transform: rotate(180deg) scale(1.1);
          filter: drop-shadow(0 0 30px rgba(26, 115, 232, 0.44));
          stroke-width: 8;
        }
        100% {
          transform: rotate(360deg) scale(0.9);
          filter: drop-shadow(0 0 10px rgba(26, 115, 232, 0.22));
          stroke-width: 4;
        }
      }

      @keyframes burstContainer {
        0% { transform: scale(1) rotate(0deg); opacity: 1; }
        30% { transform: scale(0.6) rotate(-45deg); opacity: 1; }
        60% { transform: scale(4) rotate(20deg); opacity: 1; }
        100% { transform: scale(60) rotate(90deg); opacity: 0; }
      }

      @keyframes burstPoly {
        0% { filter: drop-shadow(0 0 20px rgba(255,255,255,0.8)); stroke-width: 8; stroke: #ffffff; }
        30% { stroke: #3b82f6; filter: drop-shadow(0 0 40px rgba(59, 130, 246, 1)); stroke-width: 16; }
        60% { stroke: #a855f7; filter: drop-shadow(0 0 60px rgba(168, 85, 247, 1)); stroke-width: 4; }
        100% { stroke: #ec4899; filter: drop-shadow(0 0 100px rgba(236, 72, 153, 0)); stroke-width: 0.5; }
      }

      @keyframes revealHole {
        0% { transform: scale(1) rotate(0deg); opacity: 1; }
        30% { transform: scale(0.6) rotate(-45deg); opacity: 1; }
        60% { transform: scale(4) rotate(20deg); opacity: 1; }
        100% { transform: scale(60) rotate(90deg); opacity: 1; }
      }

      .animate-sin-spin {
        animation: sinSpin 4s cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite;
        animation-delay: var(--intro-phase-delay, 0ms);
        transform-origin: center;
      }

      .animate-burst-container {
        animation: burstContainer 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      .animate-burst-poly {
        animation: burstPoly 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
        stroke-linejoin: round;
        stroke-linecap: round;
      }

      @media (max-width: 760px) {
        main {
          padding-top: 18px;
        }

        .profile-cover {
          min-height: 118px;
        }

        .profile-body {
          grid-template-columns: 1fr;
          gap: 0;
        }

        .avatar-ring {
          width: 110px;
          height: 110px;
          transform: translateY(-38px);
        }

        .avatar {
          border-width: 6px;
          font-size: 3.2rem;
        }

        .profile-info {
          padding-top: 0;
          margin-top: -22px;
        }

        .profile-top {
          display: grid;
        }

        h1 {
          font-size: clamp(3.6rem, 18vw, 5rem);
        }

        .links {
          grid-template-columns: 1fr;
        }

      }

      @media (max-width: 620px) {
        header {
          gap: 12px;
          padding-inline: 14px;
        }

        .brand {
          font-size: 0.96rem;
        }

        .privacy {
          grid-template-columns: 1fr;
        }

        .external-actions {
          display: grid;
        }

      }
    </style>
  </head>
  <body class="min-h-screen bg-white text-slate-900 antialiased">
    <div class="page px-5 pb-28 pt-10 sm:px-6 lg:px-8">
      <main class="mx-auto w-full max-w-5xl space-y-6">
        <section class="profile overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm" aria-label="Mason profile">
          <div class="profile-cover h-36 bg-gradient-to-br from-brand-100 via-white to-emerald-50" aria-hidden="true"></div>
          <div class="profile-body flex items-end gap-5 px-5 pb-6 sm:px-8">
            <div class="avatar-ring -mt-12 grid size-24 shrink-0 place-items-center rounded-2xl bg-white p-1 shadow-lg" aria-hidden="true">
              <div class="avatar grid size-full place-items-center rounded-xl bg-gradient-to-br from-brand-500 to-blue-700 text-3xl font-black text-white">M</div>

            <div class="profile-info min-w-0 py-2">

        </section>

        <section class="content-grid rounded-lg border border-slate-200 bg-slate-50 p-5 shadow-sm sm:p-6" aria-label="Profile links">
          <div class="section-title mb-4 flex items-center justify-between">
            <span class="text-sm font-black uppercase tracking-wider text-slate-500">Links</span>

      </main>
    </div>

    <section class="privacy fixed inset-x-4 bottom-4 z-[60] mx-auto max-w-3xl rounded-lg border border-slate-200 bg-white/95 p-4 text-sm font-medium leading-6 text-slate-700 shadow-2xl shadow-slate-900/10 backdrop-blur" data-privacy-banner aria-live="polite">
      <p class="m-0">We value your privacy. This page does not load third-party tracking scripts. Read the <a class="font-bold text-blue-700 underline decoration-blue-300 underline-offset-4" href="/p/legal/privacy/">privacy policy</a>.</p>
      <div class="privacy-actions mt-3">
        <button class="rounded-full bg-slate-950 px-5 py-2 text-sm font-bold text-white transition hover:bg-brand-600" type="button" data-privacy-choice="seen">Got it</button>

    </section>

    <div class="external-modal fixed inset-0 z-[70] bg-slate-950/35 p-4 backdrop-blur-sm" data-external-modal aria-hidden="true">
      <section class="external-panel w-full max-w-md rounded-lg border border-slate-200 bg-white p-6 shadow-2xl" role="dialog" aria-modal="true" aria-labelledby="external-title">
        <div class="external-code mb-4 inline-flex rounded-full bg-blue-50 px-3 py-1 text-xs font-black uppercase tracking-wider text-blue-700">External site</div>
        <h2 class="m-0 text-2xl font-black text-slate-950" id="external-title">You are leaving mas0ng.com</h2>
        <p class="m-0 mt-3 text-sm font-medium leading-6 text-slate-600">This link opens another website. Check the host before continuing.</p>
        <span class="external-host mt-4 block rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-800" data-external-host></span>
        <div class="external-actions mt-5 grid gap-3 sm:grid-cols-2">
          <button class="rounded-full border border-slate-200 bg-white px-5 py-2.5 text-sm font-bold text-slate-700 transition hover:border-slate-300 hover:bg-slate-50" type="button" data-external-cancel>Stay here</button>
          <button class="rounded-full bg-brand-600 px-5 py-2.5 text-sm font-bold text-white shadow-lg shadow-blue-600/20 transition hover:bg-brand-500" type="button" data-external-continue>Continue</button>
        </div>
      </section>
    </div>

    <div class="intro-overlay" id="intro-overlay" aria-hidden="true">
      <svg id="reveal-screen" class="reveal-screen">
        <defs>
          <mask id="reveal-mask">
            <rect x="0" y="0" width="100%" height="100%" fill="white"></rect>
            <polygon id="reveal-hole" class="reveal-hole" fill="black"></polygon>
          </mask>
        </defs>
        <rect x="0" y="0" width="100%" height="100%" fill="#ffffff" mask="url(#reveal-mask)"></rect>

      <div class="intro-stage">
        <div id="spinner-container" class="spinner-container">

              <polygon points="50,10 88,38 74,82 26,82 12,38" fill="none" stroke="#101418" stroke-linejoin="round" stroke-linecap="round" class="poly-shape"></polygon>
            </svg>
          </div>
        </div>
      </div>
      <p class="intro-status" data-intro-status></p>
    </div>

    <script>
      const banner = document.querySelector("[data-privacy-banner]");
      const overlay = document.querySelector("#intro-overlay");
      const externalModal = document.querySelector("[data-external-modal]");
      const externalHost = document.querySelector("[data-external-host]");
      const externalCancel = document.querySelector("[data-external-cancel]");
      const externalContinue = document.querySelector("[data-external-continue]");
      const socialLinksContainer = document.querySelector("[data-social-links]");

      const socials = [
        {
          name: "Instagram",
          username: "@mas0ngi",
          url: "https://www.instagram.com/mas0ngi",
          icon: "/public_assets/social_icons/instagram.svg"
        },
        {
          name: "TikTok",
          username: "@mas0ng",
          url: "https://www.tiktok.com/@mas0ng",
          icon: "/public_assets/social_icons/tiktok.svg"
        },
        {
          name: "Snapchat",
          username: "mas0ng",
          url: "https://www.snapchat.com/add/mas0ng",
          icon: "/public_assets/social_icons/snapchat.svg"
        }
      ];

      let isRevealing = false;
      let pendingExternalUrl = "";

      bootPage();
      renderSocialLinks();

      window.addEventListener("resize", () => {
        if (isRevealing) positionRevealHole();
      });

      document.addEventListener("click", (event) => {
        const externalLink = event.target.closest("[data-external-link]");
        if (externalLink) {
          event.preventDefault();
          openExternalWarning(externalLink.href);
          return;
        }

        const button = event.target.closest("[data-privacy-choice]");
        if (!button) return;
        try {
          localStorage.setItem("mas0ng_privacy_choice", "seen");
        } catch {}
        banner.dataset.open = "false";
      });

      externalCancel.addEventListener("click", closeExternalWarning);

      externalContinue.addEventListener("click", () => {
        if (!pendingExternalUrl) return;
        const nextUrl = pendingExternalUrl;
        closeExternalWarning();
        window.open(nextUrl, "_blank", "noopener,noreferrer");
      });

      externalModal.addEventListener("click", (event) => {
        if (event.target === externalModal) closeExternalWarning();
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeExternalWarning();
        }
      });

      function bootPage() {
        const params = new URLSearchParams(window.location.search);
        const shouldPlayIntro = params.get("from") === "index";
        const introState = readIntroState(params);

        if (shouldPlayIntro) {
          ["from", "phase", "rotation", "scale", "size"].forEach((key) => params.delete(key));
          const nextQuery = params.toString();
          const cleanUrl = `${window.location.pathname}${nextQuery ? `?${nextQuery}` : ""}${window.location.hash}`;
          window.history.replaceState({}, "", cleanUrl);
          overlay.dataset.active = "true";
          setIntroStatus("Loading /p/");
          applyIntroState(introState);
          window.setTimeout(() => {
            triggerIntroReveal();
          }, 1000);
          return;
        }

        overlay.remove();
        showPrivacyBanner();
      }

      function readIntroState(params) {
        return {
          phase: clampNumber(Number(params.get("phase")), 0, 3999, 0),
          rotation: clampNumber(Number(params.get("rotation")), 0, 359, 0),
          scale: clampNumber(Number(params.get("scale")), 0.75, 1.25, 0.9),
          size: clampNumber(Number(params.get("size")), 96, 420, 256)
        };
      }

      function applyIntroState(state) {
        const spinnerContainer = document.querySelector("#spinner-container");
        const movingWrapper = spinnerContainer.querySelector(".animate-sin-spin");
        spinnerContainer.style.width = `${state.size}px`;
        spinnerContainer.style.height = `${state.size}px`;
        movingWrapper.style.setProperty("--intro-phase-delay", `-${Math.round(state.phase)}ms`);
        movingWrapper.style.transform = `rotate(${state.rotation}deg) scale(${state.scale})`;
        movingWrapper.getBoundingClientRect();
        movingWrapper.style.transform = "";
      }

      function clampNumber(value, min, max, fallback) {
        if (!Number.isFinite(value)) return fallback;
        return Math.min(max, Math.max(min, value));
      }

      function renderSocialLinks() {
        socialLinksContainer.replaceChildren(...socials.map((social) => {
          const link = document.createElement("a");
          link.className = "link-card group flex min-h-24 items-center gap-4 rounded-lg border border-slate-200 bg-white p-4 text-slate-950 no-underline shadow-sm transition hover:-translate-y-0.5 hover:border-brand-200 hover:shadow-lg";
          link.href = social.url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.dataset.externalLink = "";

          const iconShell = document.createElement("span");
          iconShell.className = "icon-shell grid size-14 shrink-0 place-items-center rounded-lg bg-slate-50";
          iconShell.setAttribute("aria-hidden", "true");

          const icon = document.createElement("img");
          icon.className = "social-icon size-10";
          icon.src = social.icon;
          icon.alt = "";
          icon.width = 56;
          icon.height = 56;
          iconShell.append(icon);

          const text = document.createElement("span");
          text.className = "link-text grid min-w-0 gap-1";

          const name = document.createElement("strong");
          name.className = "text-base font-black text-slate-950";
          name.textContent = social.name;

          const username = document.createElement("small");
          username.className = "text-sm font-semibold text-slate-500";
          username.textContent = social.username;

          const arrow = document.createElement("span");
          arrow.className = "arrow ml-auto grid size-8 place-items-center rounded-lg border border-slate-200 bg-slate-50 text-slate-300 transition group-hover:translate-x-1 group-hover:border-brand-200 group-hover:text-brand-600";
          arrow.setAttribute("aria-hidden", "true");
          arrow.innerHTML = '<i data-lucide="arrow-up-right" class="size-4"></i>';

          text.append(name, username);
          link.append(iconShell, text, arrow);
          return link;
        }));
        window.mas0ngLoadDesignLibraries?.then?.(() => window.lucide?.createIcons?.());
      }

      function openExternalWarning(url) {
        let host = "external site";
        try {
          host = new URL(url).hostname.replace(/^www\./, "");
        } catch {}
        pendingExternalUrl = url;
        externalHost.textContent = host;
        externalModal.dataset.open = "true";
        externalModal.setAttribute("aria-hidden", "false");
        externalContinue.focus();
      }

      function closeExternalWarning() {
        pendingExternalUrl = "";
        externalModal.dataset.open = "false";
        externalModal.setAttribute("aria-hidden", "true");
      }

      function triggerIntroReveal() {
        if (isRevealing) return;
        isRevealing = true;
        setIntroStatus("");

        const spinnerContainer = document.querySelector("#spinner-container");
        const polygons = document.querySelectorAll(".poly-shape");
        const movingWrapper = spinnerContainer.querySelector(".animate-sin-spin");
        if (movingWrapper) movingWrapper.classList.remove("animate-sin-spin");

        positionRevealHole();
        overlay.classList.add("is-revealing");
        spinnerContainer.classList.add("animate-burst-container");
        polygons.forEach((poly) => {
          poly.classList.add("animate-burst-poly");
        });

        window.setTimeout(() => {
          overlay.remove();
          showPrivacyBanner();
        }, 1600);
      }

      function setIntroStatus(value) {
        const status = document.querySelector("[data-intro-status]");
        if (status) status.textContent = value;
      }

      function positionRevealHole() {
        const screen = document.querySelector("#reveal-screen");
        const hole = document.querySelector("#reveal-hole");
        const width = window.innerWidth || 1;
        const height = window.innerHeight || 1;
        const base = 204;
        const centerX = width / 2;
        const centerY = height / 2;
        const points = [
          [50, 10],
          [88, 38],
          [74, 82],
          [26, 82],
          [12, 38]
        ].map(([x, y]) => {
          const nextX = centerX + ((x - 50) / 100) * base;
          const nextY = centerY + ((y - 50) / 100) * base;
          return `${nextX},${nextY}`;
        }).join(" ");

        screen.setAttribute("viewBox", `0 0 ${width} ${height}`);
        hole.setAttribute("points", points);
      }

      function showPrivacyBanner() {
        let choice = "";
        try {
          choice = localStorage.getItem("mas0ng_privacy_choice") || "";
        } catch {}
        if (!choice) banner.dataset.open = "true";
      }
    </script>
  </body>
</html>
