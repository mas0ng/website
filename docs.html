<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki & Docs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 30px 30px;
        }
        /* Markdown Styles */
        .prose h1 { font-size: 2.5em; font-weight: 800; margin-bottom: 0.5em; color: white; }
        .prose h2 { font-size: 1.8em; font-weight: 700; margin-top: 1em; margin-bottom: 0.5em; color: #e2e8f0; }
        .prose h3 { font-size: 1.5em; font-weight: 600; margin-top: 1em; margin-bottom: 0.5em; color: #cbd5e1; }
        .prose p { margin-bottom: 1em; line-height: 1.7; color: #94a3b8; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; color: #94a3b8; margin-bottom: 1em; }
        .prose code { background: #1e293b; padding: 0.2em 0.4em; rounded: 4px; color: #38bdf8; font-family: monospace; }
        .prose pre { background: #1e293b; padding: 1em; border-radius: 8px; overflow-x: auto; margin-bottom: 1em; }
        .prose blockquote { border-left: 4px solid #3b82f6; padding-left: 1em; color: #cbd5e1; font-style: italic; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>

    <script src="/assets/js/inject.js" defer></script>
</head>
<body class="text-slate-100 min-h-screen flex flex-col font-sans">

    <nav class="p-6">
        <a href="/" class="text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-arrow-left"></i> Home</a>
    </nav>

    <main id="app" class="flex-grow max-w-5xl mx-auto w-full p-6 md:p-12 mb-12">
        </main>

    <script>
        const app = document.getElementById('app');
        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('docId');

        async function init() {
            if (docId) {
                await loadDoc(docId);
            } else {
                await loadIndex();
            }
        }

        // 1. VIEW: List of Docs
        async function loadIndex() {
            try {
                const response = await fetch('/assets/data/docs/main.json');
                if (!response.ok) throw new Error("Failed to load index");
                const data = await response.json();

                if (data.length === 0) {
                    app.innerHTML = `<div class="text-center text-slate-500 mt-20">No documentation found.</div>`;
                    return;
                }

                let html = `
                    <h1 class="text-4xl font-bold mb-8 fade-in">Documentation</h1>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 fade-in">
                `;

                data.forEach(item => {
                    html += `
                        <a href="?docId=${item.id}" class="block p-6 bg-slate-800/50 border border-slate-700 hover:border-blue-500 rounded-xl transition-all hover:bg-slate-800 group">
                            <div class="flex items-start gap-4">
                                <div class="text-blue-400 text-3xl group-hover:scale-110 transition-transform">
                                    <i class="${item.coverIcon}"></i>
                                </div>
                                <div>
                                    <h2 class="text-xl font-bold text-white group-hover:text-blue-400 transition-colors">${item.title}</h2>
                                    <p class="text-slate-400 text-sm mt-2">${item.description}</p>
                                </div>
                            </div>
                        </a>
                    `;
                });

                html += `</div>`;
                app.innerHTML = html;

            } catch (error) {
                app.innerHTML = `<div class="text-center text-red-400 mt-20">Error loading documents.<br><span class="text-sm opacity-50">${error}</span></div>`;
            }
        }

        // 2. VIEW: Single Doc
        async function loadDoc(id) {
            try {
                // Show loading state
                app.innerHTML = `<div class="text-center mt-20 animate-pulse text-slate-500">Loading document...</div>`;

                const response = await fetch(`/assets/data/docs/markdown/${id}.json`);
                
                if (!response.ok) {
                    app.innerHTML = `
                        <div class="text-center mt-20">
                            <h2 class="text-2xl font-bold text-white">Document Not Found</h2>
                            <p class="text-slate-500 mt-2">The requested document ID "${id}" does not exist.</p>
                            <a href="docs.html" class="inline-block mt-6 px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-500 text-white">Back to Wiki</a>
                        </div>
                    `;
                    return;
                }

                const data = await response.json();
                
                // Parse markdown
                const parsedContent = marked.parse(data.content);

                app.innerHTML = `
                    <div class="fade-in">
                        <a href="docs.html" class="inline-flex items-center text-sm text-blue-400 hover:text-blue-300 mb-6">
                            <i class="fa-solid fa-chevron-left mr-2"></i> Back to Index
                        </a>
                        
                        <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-8 md:p-12 shadow-2xl">
                            <div class="border-b border-slate-800 pb-6 mb-8">
                                <h1 class="text-3xl md:text-5xl font-bold text-white tracking-tight">${data.title}</h1>
                                <div class="mt-4 text-slate-500 text-sm flex items-center gap-2">
                                    <i class="fa-regular fa-clock"></i> Last Updated: ${data.lastUpdated || 'Unknown'}
                                </div>
                            </div>
                            <div class="prose max-w-none">
                                ${parsedContent}
                            </div>
                        </div>
                    </div>
                `;

            } catch (error) {
                app.innerHTML = `<div class="text-center text-red-400 mt-20">System Error.<br><span class="text-sm opacity-50">${error}</span></div>`;
            }
        }

        init();
    </script>
</body>
</html>
