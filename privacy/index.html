<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mas0ng.com | Privacy</title>
    <link rel="icon" type="image/png" href="/assets/icons/siteIcons/favicons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/icons/siteIcons/favicons/favicon.svg" />
    <link rel="shortcut icon" href="/assets/icons/siteIcons/favicons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/siteIcons/favicons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="mas0ng.com" />
    <link rel="manifest" href="/assets/icons/siteIcons/favicons/site.webmanifest" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ig: { bg: '#fafafa', text: '#262626', stroke: '#dbdbdb', blue: '#0095f6' }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .pt-safe { padding-top: env(safe-area-inset-top, 20px); }
    </style>
</head>
<body class="bg-ig-bg text-ig-text font-sans antialiased min-h-screen flex flex-col">

    <div class="w-full max-w-4xl mx-auto p-6 md:p-12 flex-grow flex flex-col">
        
        <header class="flex flex-col gap-4 mb-10 pt-safe">
            <a id="back-btn" href="/" class="inline-flex items-center gap-2 text-sm font-semibold text-gray-500 hover:text-black transition-colors w-fit">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                <span id="back-text">Back</span>
            </a>
            
            <div>
                <h1 class="text-3xl md:text-4xl font-light tracking-tight text-black mb-2">Privacy Hub</h1>
                <p class="text-gray-500 max-w-xl">
                    Transparency is key. Here you can find all details regarding how your data is handled, stored, and protected.
                </p>
            </div>
        </header>

        <div id="skeleton-loader" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="h-48 bg-white rounded-xl border border-ig-stroke p-6 animate-pulse flex flex-col justify-between">
                <div class="space-y-3">
                    <div class="w-12 h-12 bg-gray-100 rounded-lg"></div>
                    <div class="h-5 bg-gray-100 rounded w-1/2"></div>
                    <div class="h-4 bg-gray-50 rounded w-3/4"></div>
                </div>
            </div>
            <div class="h-48 bg-white rounded-xl border border-ig-stroke p-6 animate-pulse flex flex-col justify-between">
                <div class="space-y-3">
                    <div class="w-12 h-12 bg-gray-100 rounded-lg"></div>
                    <div class="h-5 bg-gray-100 rounded w-1/2"></div>
                    <div class="h-4 bg-gray-50 rounded w-3/4"></div>
                </div>
            </div>
        </div>

        <div id="content-grid" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
        
        <div id="error-msg" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <p class="text-gray-900 font-medium">Unable to load policies</p>
            <p class="text-gray-500 text-sm mt-1">Please check your connection and try again.</p>
        </div>

    </div>

    <script src="/assets/js/footer.js"></script>

    <script>
        (function handleReturnAddress() {
            const params = new URLSearchParams(window.location.search);
            const returnUrl = params.get('return_to');
            
            if (returnUrl) {
                const backBtn = document.getElementById('back-btn');
                const backText = document.getElementById('back-text');
                
                backBtn.href = returnUrl;
                backText.textContent = "Back";
            }
        })();

        const icons = {
            shield: `<svg class="w-6 h-6 text-ig-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>`,
            lock: `<svg class="w-6 h-6 text-ig-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>`
        };

        async function initHub() {
            const skeleton = document.getElementById('skeleton-loader');
            const grid = document.getElementById('content-grid');
            const errorMsg = document.getElementById('error-msg');

            const params = new URLSearchParams(window.location.search);
            const returnUrl = params.get('return_to');

            try {
                const res = await fetch('data/all-policies.json');
                if (!res.ok) throw new Error('Failed to load data');

                const data = await res.json();
                
                await new Promise(r => setTimeout(r, 400));

                if (!data.policies || data.policies.length === 0) throw new Error('Empty data');

                grid.innerHTML = data.policies.map(p => {
                    
                    let linkUrl = `policy.html?id=${p.id}`;
                    if (returnUrl) {
                        linkUrl += `&return_to=${encodeURIComponent(returnUrl)}`;
                    }

                    return `
                        <a href="${linkUrl}" class="group block bg-white p-6 rounded-xl border border-ig-stroke hover:border-gray-300 hover:shadow-lg transition-all duration-300 relative overflow-hidden">
                            
                            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-gray-200 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>

                            <div class="flex flex-col h-full">
                                <div class="w-12 h-12 rounded-lg bg-blue-50 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform duration-300">
                                    ${icons.shield}
                                </div>
                                
                                <h2 class="text-lg font-bold text-gray-900 mb-2 group-hover:text-ig-blue transition-colors">${p.title}</h2>
                                <p class="text-sm text-gray-500 mb-6 flex-grow leading-relaxed">${p.description}</p>
                                
                                <div class="flex items-center text-xs font-bold text-ig-blue uppercase tracking-wider mt-auto">
                                    Read Policy
                                    <svg class="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                                </div>
                            </div>
                        </a>
                    `;
                }).join('');

                skeleton.classList.add('hidden');
                grid.classList.remove('hidden');

            } catch (err) {
                console.error(err);
                skeleton.classList.add('hidden');
                errorMsg.classList.remove('hidden');
            }
        }

        initHub();
    </script>
</body>
</html>
