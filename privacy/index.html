<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Hub</title>
    <style>
        :root { --bg-color: #fafafa; --border: 1px solid #dbdbdb; --accent-blue: #0095f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); display: flex; justify-content: center; padding-top: 60px; }
        .container { width: 100%; max-width: 480px; padding: 20px; }
        .menu-list { background: #fff; border: var(--border); border-radius: 12px; overflow: hidden; }
        .menu-item { text-decoration: none; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #efefef; color: #262626; transition: 0.2s; }
        .menu-item:hover { background: #fafafa; }
        .menu-item h2 { font-size: 16px; margin: 0; font-weight: 500; }
        .menu-item p { font-size: 13px; color: #8e8e8e; margin: 4px 0 0 0; }
        .chevron { color: #c7c7cc; font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="font-size:24px; padding-left:10px;">Privacy Hub</h1>
        <div class="menu-list" id="menu-container"></div>
    </div>

    <script>
        async function loadHub() {
            const res = await fetch('data/all-policies.json');
            const data = await res.json();
            const container = document.getElementById('menu-container');
            
            data.policies.forEach(p => {
                container.innerHTML += `
                    <a href="policy.html?id=${p.id}" class="menu-item">
                        <div>
                            <h2>${p.title}</h2>
                            <p>${p.description}</p>
                        </div>
                        <div class="chevron">›</div>
                    </a>
                `;
            });
        }
        loadHub();
    </script>
</body>
</html>
