<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>

    <script src="/assets/js/inject.js" defer></script>
</head>
<body class="text-slate-100 min-h-screen flex flex-col font-sans">

    <nav class="p-6">
        <a href="/" class="text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-arrow-left"></i> Home</a>
    </nav>

    <main id="app" class="flex-grow max-w-6xl mx-auto w-full p-6 md:p-12 mb-12">
        </main>

    <script>
        const app = document.getElementById('app');
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('projectId');

        async function init() {
            if (projectId) {
                await loadProject(projectId);
            } else {
                await loadIndex();
            }
        }

        // 1. VIEW: List
        async function loadIndex() {
            try {
                const response = await fetch('/assets/data/projects/main.json');
                const data = await response.json();

                if (!data || data.length === 0) {
                    app.innerHTML = `<div class="text-center text-slate-500 mt-20">There are no available projects right now.</div>`;
                    return;
                }

                let html = `
                    <h1 class="text-4xl font-bold mb-2 fade-in">Projects</h1>
                    <p class="text-slate-500 mb-10 fade-in">Selected works and experiments.</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 fade-in">
                `;

                data.forEach(item => {
                    html += `
                        <a href="?projectId=${item.id}" class="block h-full bg-slate-800 border border-slate-700 rounded-xl overflow-hidden hover:border-blue-500 hover:shadow-2xl hover:shadow-blue-900/20 transition-all duration-300 group flex flex-col">
                            <div class="p-8 flex-grow">
                                <div class="w-12 h-12 bg-slate-700 rounded-lg flex items-center justify-center text-2xl text-blue-400 mb-6 group-hover:scale-110 transition-transform group-hover:bg-blue-600 group-hover:text-white">
                                    <i class="${item.coverIcon}"></i>
                                </div>
                                <h2 class="text-xl font-bold text-white mb-2">${item.title}</h2>
                                <p class="text-slate-400 text-sm leading-relaxed">${item.description}</p>
                            </div>
                            <div class="px-8 py-4 bg-slate-900/50 border-t border-slate-700 flex justify-between items-center">
                                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">View Details</span>
                                <i class="fa-solid fa-arrow-right text-slate-500 group-hover:text-blue-400 transition-colors"></i>
                            </div>
                        </a>
                    `;
                });

                html += `</div>`;
                app.innerHTML = html;

            } catch (error) {
                app.innerHTML = `<div class="text-center text-red-400 mt-20">Error loading projects.</div>`;
            }
        }

        // 2. VIEW: Detail
        async function loadProject(id) {
            try {
                app.innerHTML = `<div class="text-center mt-20 animate-pulse text-slate-500">Loading project...</div>`;
                
                const response = await fetch(`/assets/data/projects/projects/${id}.json`);
                if (!response.ok) throw new Error("Not found");
                
                const data = await response.json();
                
                // Helper to generate buttons
                const makeBtn = (url, icon, text, colorClass) => {
                    if (!url) return '';
                    return `
                        <a href="${url}" target="_blank" class="flex items-center justify-center gap-2 px-6 py-3 rounded-lg font-semibold transition-all duration-200 ${colorClass}">
                            <i class="${icon}"></i> ${text}
                        </a>
                    `;
                };

                const buttons = `
                    <div class="flex flex-wrap gap-4 mt-8">
                        ${makeBtn(data.links.github, 'fa-brands fa-github', 'GitHub', 'bg-slate-700 hover:bg-slate-600 text-white')}
                        ${makeBtn(data.links.download, 'fa-solid fa-download', 'Download', 'bg-emerald-600 hover:bg-emerald-500 text-white')}
                        ${makeBtn(data.links.docs, 'fa-solid fa-book', 'Read Docs', 'bg-blue-600 hover:bg-blue-500 text-white')}
                        ${makeBtn(data.links.demo, 'fa-solid fa-play', 'Live Demo', 'bg-purple-600 hover:bg-purple-500 text-white')}
                        ${makeBtn(data.links.external, 'fa-solid fa-up-right-from-square', 'Visit Site', 'bg-slate-700 hover:bg-slate-600 text-white')}
                    </div>
                `;

                app.innerHTML = `
                    <div class="fade-in max-w-4xl mx-auto">
                        <a href="projects.html" class="inline-flex items-center text-sm text-blue-400 hover:text-blue-300 mb-8">
                            <i class="fa-solid fa-chevron-left mr-2"></i> Back to Projects
                        </a>

                        <div class="bg-slate-800 rounded-2xl p-8 md:p-12 border border-slate-700 shadow-2xl">
                            <h1 class="text-4xl md:text-5xl font-bold text-white mb-6">${data.title}</h1>
                            
                            <div class="prose prose-invert max-w-none text-slate-300 mb-8 text-lg leading-relaxed">
                                <p>${data.longDescription || data.description}</p>
                            </div>

                            <hr class="border-slate-700 my-8">
                            
                            <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4">Actions</h3>
                            ${buttons}
                        </div>
                    </div>
                `;

            } catch (error) {
                app.innerHTML = `
                    <div class="text-center mt-20">
                        <h2 class="text-2xl font-bold text-white">Project Not Found</h2>
                        <a href="projects.html" class="inline-block mt-6 px-4 py-2 bg-blue-600 rounded-lg text-white">Back</a>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
