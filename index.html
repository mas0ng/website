<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Mason / @mas0ng" />
  <title>mas0ng.com</title>

  <script src="assets/js/theme-controller.js"></script>
  <script src="assets/js/inject.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/site-theme.css">
</head>
<body>
  <main class="site-shell">
    <section class="site-slab">
      <h1 class="site-title">Mason / @mas0ng</h1>
    </section>

    <section class="site-grid">
      <article class="site-panel">
        <h2>Live TikTok stats</h2>
        <div class="stats-strip" aria-label="Live TikTok stats">
          <div class="stat-box">
            <div class="stat-label">
              <span class="status-dot" aria-hidden="true"></span>
              Followers
            </div>
            <div class="stat-number" id="followers-count">0</div>
            <div class="stat-sub">Combined total across all TikTok accounts.</div>
          </div>

          <div class="stat-box">
            <div class="stat-label">
              <span class="status-dot" aria-hidden="true"></span>
              Likes
            </div>
            <div class="stat-number" id="likes-count">0</div>
            <div class="stat-sub">Combined likes across all TikTok accounts.</div>
          </div>

          <div class="stat-box">
            <div class="stat-label">
              <span class="status-dot" aria-hidden="true"></span>
              Views
            </div>
            <div class="stat-number" id="views-count">0</div>
            <div class="stat-sub">Combined views across all TikTok accounts in the past 365 days.</div>
          </div>
        </div>
        <div class="updated" id="last-updated">Fetching live stats...</div>
      </article>

      <aside class="social-rail" aria-label="Profile links">
        <a href="https://www.tiktok.com/@mas0ng" target="_blank" rel="noopener">
          <img src="assets/icons/socials/light/tiktok.png" data-themed-icon data-icon-root="assets/icons/socials" data-icon-base="tiktok" alt="" />
          <span>TikTok</span>
        </a>
        <a href="https://www.instagram.com/mas0ngi/" target="_blank" rel="noopener">
          <img src="assets/icons/socials/light/instagram.png" data-themed-icon data-icon-root="assets/icons/socials" data-icon-base="instagram" alt="" />
          <span>Instagram</span>
        </a>
        <a href="https://github.com/mas0ng" target="_blank" rel="noopener">
          <img src="assets/icons/socials/light/github.png" data-themed-icon data-icon-root="assets/icons/socials" data-icon-base="github" alt="" />
          <span>GitHub</span>
        </a>
        <a href="https://signal.me/#eu/Js8_IVmBa0zw4nGdLTvE1Fbcg6mUcmm11h34T-4CjCwgk8jx76hAQbvCkyHjY9JO" target="_blank" rel="noopener">
          <img src="assets/icons/socials/light/signal.png" data-themed-icon data-icon-root="assets/icons/socials" data-icon-base="signal" alt="" />
          <span>Signal</span>
        </a>
        <a href="mailto:mason@mas0ng.com">
          <img src="assets/icons/socials/light/email.png" data-themed-icon data-icon-root="assets/icons/socials" data-icon-base="email" alt="" />
          <span>Email</span>
        </a>
      </aside>
    </section>
  </main>

  <script>
    const WORKER_URL = 'https://www.mas0ng.com/api/social_data';

    function parseMetric(value) {
      if (value === null || value === undefined || value === '') return null;
      const num = Number(value);
      if (!Number.isFinite(num) || num < 0) return null;
      return num;
    }

    function formatCompact1dp(num) {
      const abs = Math.abs(num);

      if (abs >= 1e9) return (num / 1e9).toFixed(1) + 'B';
      if (abs >= 1e6) return (num / 1e6).toFixed(1) + 'M';
      if (abs >= 1e3) return (num / 1e3).toFixed(1) + 'K';
      return Math.round(num).toLocaleString();
    }

    function animateCompact(el, target, duration = 1300) {
      const start = performance.now();

      function frame(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = target * eased;
        el.textContent = formatCompact1dp(current);

        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          el.textContent = formatCompact1dp(target);
        }
      }

      requestAnimationFrame(frame);
    }

    function showMetricError(el, message = 'No data') {
      el.textContent = message;
      el.classList.add('stat-number--error');

      const dot = el.closest('.stat-box')?.querySelector('.status-dot');
      if (dot) {
        dot.classList.remove('status-dot--danger');
        dot.classList.add('status-dot--warning');
      }
    }

    function showMetricValue(el, value, duration) {
      el.classList.remove('stat-number--error');

      const dot = el.closest('.stat-box')?.querySelector('.status-dot');
      if (dot) {
        dot.classList.remove('status-dot--danger', 'status-dot--warning');
      }

      animateCompact(el, value, duration);
    }

    async function fetchMetrics() {
      const updatedEl = document.getElementById('last-updated');
      const metrics = [
        { key: 'followers', el: document.getElementById('followers-count'), duration: 1400 },
        { key: 'likes', el: document.getElementById('likes-count'), duration: 1500 },
        { key: 'views', el: document.getElementById('views-count'), duration: 1600 }
      ];

      try {
        const response = await fetch(WORKER_URL);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to fetch');
        }

        let failedMetrics = 0;

        metrics.forEach((metric) => {
          const value = parseMetric(data[metric.key]);
          if (value === null) {
            failedMetrics += 1;
            showMetricError(metric.el);
            return;
          }

          showMetricValue(metric.el, value, metric.duration);
        });

        const date = new Date(data.lastUpdated);
        const hasValidDate = Number.isFinite(date.getTime());
        if (failedMetrics > 0 && hasValidDate) {
          updatedEl.textContent = `Last updated: ${date.toLocaleString()} - some stats unavailable`;
        } else if (hasValidDate) {
          updatedEl.textContent = `Last updated: ${date.toLocaleString()}`;
        } else if (failedMetrics > 0) {
          updatedEl.textContent = 'Some stats unavailable';
        } else {
          updatedEl.textContent = 'Stats loaded';
        }
      } catch (error) {
        console.error('API Fetch Error:', error);
        metrics.forEach((metric) => showMetricError(metric.el, 'Offline'));
        updatedEl.textContent = 'Live stats unavailable right now';
      }
    }

    fetchMetrics();
  </script>
</body>
</html>
