<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>401 | mas0ng</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#080808">
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        background: #080808;
        color: #d8d8d8;
        --panel: rgba(13, 13, 13, 0.96);
        --line: #242424;
        --muted: #858585;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 22px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 32%),
          #080808;
        background-size: 44px 44px, 44px 44px, 100% 100%, auto;
      }

      main {
        position: relative;
        width: min(100%, 660px);
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        padding: 0;
        font-size: 1rem;
        letter-spacing: 0;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      }

      main::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.025) 0,
          rgba(255, 255, 255, 0.025) 1px,
          transparent 1px,
          transparent 7px
        );
        opacity: 0.42;
      }

      main::after {
        content: "";
        position: absolute;
        top: 0;
        left: 22px;
        right: 22px;
        height: 1px;
        background: #d8d8d8;
        opacity: 0.34;
      }

      h1,
      p {
        margin: 0;
      }

      .bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--line);
        padding: 14px 18px;
        color: #737373;
        font-size: 0.78rem;
      }

      .bar strong {
        color: #d8d8d8;
        font-weight: 500;
      }

      .body {
        position: relative;
        display: grid;
        gap: 18px;
        padding: 28px;
      }

      .code {
        color: #737373;
        font-size: 0.85rem;
      }

      h1 {
        max-width: 12ch;
        font-size: clamp(2.4rem, 10vw, 5.2rem);
        line-height: 0.96;
        font-weight: 500;
      }

      p {
        max-width: 54ch;
        color: var(--muted);
        line-height: 1.55;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .meta div {
        border: 1px solid var(--line);
        background: #090909;
        padding: 10px;
      }

      .meta span {
        display: block;
        color: #666;
        font-size: 0.72rem;
      }

      .meta strong {
        display: block;
        margin-top: 4px;
        color: #d8d8d8;
        font-weight: 500;
      }

      a {
        display: inline-flex;
        border: 1px solid #303030;
        border-radius: 4px;
        background: #d8d8d8;
        color: #080808;
        padding: 11px 14px;
        text-decoration: none;
        width: fit-content;
      }

      span {
        color: #6f6f6f;
      }

      @media (max-width: 560px) {
        .body {
          padding: 22px;
        }

        .bar,
        .meta {
          grid-template-columns: 1fr;
        }

        .bar {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="bar">
        <strong>mas0ng.com</strong>
        <span>request blocked</span>
      </div>
      <div class="body">
        <div class="code">401 <span>|</span> unauthorized</div>
        <h1>Access denied.</h1>
        <p>You need to be logged in to access this page.</p>
        <div class="meta">
          <div><span>status</span><strong>authentication required</strong></div>
          <div><span>route</span><strong>/</strong></div>
        </div>
        <a href="/auth/login">login to continue</a>
      </div>
    </main>
  </body>
</html>
