<head>

  <style>
    .page-gradient {
      --page-gradient-height: 380px;
      --page-gradient-height-mobile: 308px;
    }

    .site-shell {
      --page-shell-width: 1220px;
      --page-shell-overlap: -88px;
      --page-shell-overlap-mobile: -72px;
      flex: 1;
      padding-bottom: 8px;
    }

    .profile-head {
      display: flex;
      align-items: flex-end;
      gap: 22px;
      padding: 0 4px;
    }

    .avatar-wrap {
      flex-shrink: 0;
      margin-top: -8px;
    }

    .avatar {
      position: relative;
      width: 118px;
      height: 118px;
      border-radius: 999px;
      overflow: hidden;
      border: 4px solid rgba(255, 255, 255, 0.98);
      box-shadow: 0 16px 34px rgba(15, 17, 21, 0.12);
      background: linear-gradient(135deg, #eff3f9, #dce3ef);
      display: grid;
      place-items: center;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 2.15rem;
      font-weight: 800;
      letter-spacing: -0.06em;
      color: #13161b;
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .avatar--fallback .avatar-fallback {
      opacity: 1;
      transform: scale(1);
    }

    .identity {
      min-width: 0;
      padding-top: 12px;
    }

    .name {
      margin: 0;
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.07em;
    }

    .username {
      margin-top: 8px;
      font-size: 0.98rem;
      color: var(--muted);
      font-weight: 700;
    }

    .main-grid {
      margin-top: 28px;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 46px;
      align-items: start;
    }

    .left-col,
    .right-col {
      min-width: 0;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .stat {
      min-width: 0;
      padding: 18px 20px 22px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 1));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
    }

    .stat-top {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .stat-number {
      margin-top: 10px;
      font-size: clamp(2rem, 3.5vw, 3rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.08em;
      color: #0f1115;
    }

    .stat-sub {
      margin-top: 8px;
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 600;
      line-height: 1.5;
      max-width: 270px;
    }

    .updated {
      margin-top: 18px;
      padding-left: 4px;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .link-list {
      display: grid;
      gap: 14px;
      margin-top: 2px;
    }

    .profile-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 1));
      box-shadow: var(--shadow-soft);
      transition: border-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
    }

    .profile-link:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
      box-shadow: 0 18px 34px rgba(15, 17, 21, 0.08);
    }

    .profile-link-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .profile-link-icon {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: rgba(245, 247, 251, 0.96);
      border: 1px solid var(--line);
      flex-shrink: 0;
      color: #111318;
    }

    .profile-link-icon svg {
      width: 19px;
      height: 19px;
      display: block;
    }

    .profile-link-meta {
      min-width: 0;
    }

    .profile-link-title {
      font-size: 1rem;
      font-weight: 700;
      color: #111318;
    }

    .profile-link-subtitle {
      margin-top: 2px;
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-link-arrow {
      color: #b8bec8;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    @media (max-width: 960px) {
      .main-grid {
        grid-template-columns: 1fr;
        gap: 28px;
      }
    }

    @media (max-width: 640px) {
      .profile-head {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 16px;
      }

      .avatar-wrap {
        margin-top: -2px;
      }

      .avatar {
        width: 104px;
        height: 104px;
      }

      .main-grid {
        gap: 22px;
      }

      .stats-row {
        gap: 12px;
      }

      .stat {
        padding: 16px 14px;
        text-align: center;
        border-radius: 20px;
      }

      .stat-top {
        justify-content: center;
      }

      .stat-number {
        text-align: center;
      }

      .stat-sub {
        max-width: none;
        text-align: center;
      }

      .updated {
        text-align: center;
        padding-left: 0;
      }

      .link-list {
        gap: 12px;
      }

      .profile-link {
        padding: 16px;
        border-radius: 20px;
      }
    }
  </style>
</head>

  <script>
    const WORKER_URL = 'https://ttdata.mas0ngcloud.com/';

    function formatCompact1dp(value) {
      const num = Number(value) || 0;
      const abs = Math.abs(num);

      if (abs >= 1e9) return (num / 1e9).toFixed(1) + 'B';
      if (abs >= 1e6) return (num / 1e6).toFixed(1) + 'M';
      if (abs >= 1e3) return (num / 1e3).toFixed(1) + 'K';
      return Math.round(num).toLocaleString();
    }

    function animateCompact(el, target, duration = 1300) {
      const start = performance.now();

      function frame(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = target * eased;
        el.textContent = formatCompact1dp(current);

        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          el.textContent = formatCompact1dp(target);
        }
      }

      requestAnimationFrame(frame);
    }

    async function fetchMetrics() {
      const followersEl = document.getElementById('followers-count');
      const likesEl = document.getElementById('likes-count');
      const updatedEl = document.getElementById('last-updated');

      try {
        const response = await fetch(WORKER_URL);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to fetch');
        }

        const followers = Number(data.followers || 0);
        const likes = Number(data.likes || 0);

        animateCompact(followersEl, followers, 1400);
        animateCompact(likesEl, likes, 1500);

        const date = new Date(data.lastUpdated);
        updatedEl.textContent = `Last updated: ${date.toLocaleString()}`;
      } catch (error) {
        console.error('API Fetch Error:', error);
        followersEl.textContent = '\u2014';
        likesEl.textContent = '\u2014';
        updatedEl.textContent = 'Live stats unavailable right now';
      }
    }

    fetchMetrics();
  </script>
