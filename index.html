<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>401 | mas0ng.com</title>
    <meta name="description" content="Unauthorised. Please log in to access mas0ng.com.">
    <meta name="theme-color" content="#07111f">
    <link rel="icon" type="image/svg+xml" sizes="128x128" href="/public_assets/site_branding/favicon.svg">
    <link rel="icon" type="image/svg+xml" sizes="256x256" href="/public_assets/site_branding/apple-touch-icon.svg">
    <link rel="icon" type="image/svg+xml" sizes="512x512" href="/public_assets/site_branding/favicon.svg">
    <link rel="apple-touch-icon" href="/public_assets/site_branding/apple-touch-icon.svg">
    <meta property="og:title" content="401 | mas0ng.com">
    <meta property="og:description" content="Unauthorised. Please log in to access mas0ng.com.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.mas0ng.com/">
    <meta property="og:image" content="https://www.mas0ng.com/public_assets/site_branding/social-card.svg">
    <meta property="og:image:width" content="800">
    <meta property="og:image:height" content="800">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="401 | mas0ng.com">
    <meta name="twitter:description" content="Unauthorised. Please log in to access mas0ng.com.">
    <meta name="twitter:image" content="https://www.mas0ng.com/public_assets/site_branding/social-card.svg">
    <script src="/site-libs.js"></script>
    <script defer src="/navbar.js" data-active="home"></script>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07111f;
        color: #f8fbff;
        --line: rgba(255, 255, 255, 0.12);
        --surface: rgba(10, 21, 37, 0.82);
        --muted: #a8b5c8;
        --blue-soft: #dbeafe;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: #07111f;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(180deg, rgba(7, 17, 31, 0.96), rgba(7, 17, 31, 0.78)),
          radial-gradient(circle at 18% 16%, rgba(56, 189, 248, 0.18), transparent 360px),
          radial-gradient(circle at 82% 12%, rgba(34, 197, 94, 0.12), transparent 320px),
          linear-gradient(180deg, #07111f 0%, #0b1525 100%);
        color: #f8fbff;
        font-family: inherit;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(90deg, rgba(56, 189, 248, 0.07) 1px, transparent 1px),
          linear-gradient(180deg, rgba(56, 189, 248, 0.055) 1px, transparent 1px);
        background-size: 46px 46px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.78), transparent 70%);
        pointer-events: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(90px, 12vw, 124px) 18px 48px;
      }

      .error-panel {
        width: min(100%, 680px);
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--surface);
        padding: clamp(28px, 6vw, 54px);
        text-align: center;
        box-shadow: 0 28px 84px rgba(2, 6, 23, 0.34);
        backdrop-filter: blur(18px);
      }

      .status-code {
        color: rgba(219, 234, 254, 0.22);
        font-size: clamp(5.5rem, 22vw, 11rem);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 0.78;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        margin-top: 22px;
        color: #ffffff;
        font-size: clamp(2.15rem, 7vw, 4.4rem);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 0.96;
      }

      p {
        max-width: 44ch;
        margin: 18px auto 0;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.16rem);
        font-weight: 650;
        line-height: 1.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-top: 28px;
      }

      .actions a {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 14px;
        padding: 0 18px;
        font-size: 0.94rem;
        font-weight: 900;
        transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
      }

      .login-action {
        border: 1px solid #bfdbfe;
        background: var(--blue-soft);
        color: #061224;
      }

      .legal-action {
        border: 1px solid rgba(255, 255, 255, 0.13);
        background: rgba(255, 255, 255, 0.08);
        color: #f8fbff;
      }

      .actions a:hover {
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="error-panel" aria-labelledby="page-title">
        <div class="status-code" aria-hidden="true">401</div>
        <h1 id="page-title">Unauthorised</h1>
        <p>You need to log in before you can access mas0ng.com.</p>
        <div class="actions">
          <a class="login-action" href="https://auth.mas0ng.com/login?return_to=%2Fsecure%2Fapps%2F">
            <i data-lucide="log-in" class="h-4 w-4"></i>
            Log in
          </a>
          <a class="legal-action" href="/legal/">
            <i data-lucide="file-text" class="h-4 w-4"></i>
            Legal
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
