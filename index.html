<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  

  <style>
    :root {
      --text: #0f1115;
      --muted: #6f7682;
      --line: rgba(15, 17, 21, 0.08);
      --line-strong: rgba(15, 17, 21, 0.14);
      --shadow-soft: 0 10px 28px rgba(15, 17, 21, 0.06);
      --grad-1: #090914;
      --grad-2: #171036;
      --grad-3: #4420b7;
      --grad-4: #1d61e7;
      --grad-5: #b44be9;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: #fff;
    }

    .page-gradient {
      position: relative;
      width: 100%;
      height: 360px;
      overflow: hidden;
      background:
        radial-gradient(circle at 14% 18%, rgba(255,255,255,0.11), transparent 18%),
        radial-gradient(circle at 84% 16%, rgba(255,255,255,0.09), transparent 16%),
        radial-gradient(circle at 50% 0%, rgba(18, 196, 255, 0.12), transparent 28%),
        linear-gradient(135deg, var(--grad-1) 0%, var(--grad-2) 20%, var(--grad-3) 48%, var(--grad-4) 76%, var(--grad-5) 100%);
    }

    .page-gradient::after {
      content: "";
      position: absolute;
      left: -8%;
      right: -8%;
      bottom: -88px;
      height: 190px;
      background: #ffffff;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }

    .site-shell {
      width: min(100% - 32px, 1220px);
      margin: 0 auto;
      position: relative;
      z-index: 2;
      margin-top: -88px;
      padding-bottom: 8px;
      flex: 1;
    }

    .profile-head {
      display: flex;
      align-items: flex-start;
      gap: 22px;
      padding: 0;
    }

    .avatar-wrap {
      flex-shrink: 0;
      margin-top: -8px;
    }

    .avatar {
      width: 118px;
      height: 118px;
      border-radius: 999px;
      overflow: hidden;
      border: 4px solid rgba(255,255,255,0.98);
      box-shadow: 0 16px 34px rgba(15, 17, 21, 0.12);
      background: linear-gradient(135deg, #eceff5, #d8dde8);
      display: grid;
      place-items: center;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-fallback {
      font-size: 2.15rem;
      font-weight: 800;
      letter-spacing: -0.06em;
      color: #13161b;
    }

    .identity {
      min-width: 0;
      padding-top: 12px;
    }

    .name {
      margin: 0;
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.07em;
    }

    .username {
      margin-top: 8px;
      font-size: 0.98rem;
      color: var(--muted);
      font-weight: 700;
    }

    .quote {
      margin-top: 10px;
      font-size: 0.95rem;
      color: #303742;
      font-weight: 600;
    }

    .main-grid {
      margin-top: 26px;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 46px;
      align-items: start;
    }

    .left-col,
    .right-col {
      min-width: 0;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    .stat {
      min-width: 0;
    }

    .stat-top {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .stat-number {
      margin-top: 10px;
      font-size: clamp(2rem, 3.5vw, 3rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.08em;
      color: #0f1115;
    }

    .stat-sub {
      margin-top: 8px;
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 600;
      line-height: 1.5;
      max-width: 270px;
    }

    .updated {
      margin-top: 18px;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .icon-row {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .round-link {
      width: 50px;
      height: 50px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      color: #111318;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .round-link:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: #fff;
      box-shadow: 0 14px 28px rgba(15,17,21,0.08);
    }

    .round-link svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .link-list {
      display: grid;
      gap: 4px;
      margin-top: 2px;
    }

    .profile-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
      transition: border-color .16s ease, transform .16s ease;
    }

    .profile-link:hover {
      transform: translateX(2px);
      border-color: var(--line-strong);
    }

    .profile-link:first-child {
      border-top: 1px solid var(--line);
    }

    .profile-link-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .profile-link-icon {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: rgba(245,247,251,0.92);
      border: 1px solid var(--line);
      flex-shrink: 0;
      color: #111318;
    }

    .profile-link-icon svg {
      width: 19px;
      height: 19px;
      display: block;
    }

    .profile-link-meta {
      min-width: 0;
    }

    .profile-link-title {
      font-size: 1rem;
      font-weight: 700;
      color: #111318;
    }

    .profile-link-subtitle {
      margin-top: 2px;
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-link-arrow {
      color: #b8bec8;
      font-size: 1.08rem;
      flex-shrink: 0;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34,197,94,0.42);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.42); }
      70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    @media (max-width: 960px) {
      .main-grid {
        grid-template-columns: 1fr;
        gap: 28px;
      }
    }

    @media (max-width: 640px) {
      .page-gradient {
        height: 300px;
      }

        margin-top: -72px;

        align-items: center;

        gap: 16px;
      }

      .avatar-wrap {
        margin-top: -2px;
      }

      .avatar {
        width: 104px;
        height: 104px;
      }

      .main-grid {
        gap: 22px;
      }

      .stats-row {
        gap: 12px;
      }

      .stat {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: var(--shadow-soft);
        padding: 16px 14px;
        text-align: center;
      }

      .stat-top {
        justify-content: center;
      }

      .stat-number {
        text-align: center;
      }

      .stat-sub {
        max-width: none;
        text-align: center;
      }

      .updated {
        text-align: center;
      }

      .icon-row {
        justify-content: center;
      }
    }
  </style>
</head>

  <script>
    const WORKER_URL = 'https://ttdata.mas0ngcloud.com/';

    function formatCompact1dp(value) {
      const num = Number(value) || 0;
      const abs = Math.abs(num);

      if (abs >= 1e9) return (num / 1e9).toFixed(1) + 'B';
      if (abs >= 1e6) return (num / 1e6).toFixed(1) + 'M';
      if (abs >= 1e3) return (num / 1e3).toFixed(1) + 'K';
      return Math.round(num).toLocaleString();
    }

    function animateCompact(el, target, duration = 1300) {
      const start = performance.now();

      function frame(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = target * eased;
        el.textContent = formatCompact1dp(current);

        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          el.textContent = formatCompact1dp(target);
        }
      }

      requestAnimationFrame(frame);
    }

    async function fetchMetrics() {
      const followersEl = document.getElementById('followers-count');
      const likesEl = document.getElementById('likes-count');
      const updatedEl = document.getElementById('last-updated');

      try {
        const response = await fetch(WORKER_URL);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to fetch');
        }

        const followers = Number(data.followers || 0);
        const likes = Number(data.likes || 0);

        animateCompact(followersEl, followers, 1400);
        animateCompact(likesEl, likes, 1500);

        const date = new Date(data.lastUpdated);
        updatedEl.textContent = `Last updated: ${date.toLocaleString()}`;
      } catch (error) {
        console.error('API Fetch Error:', error);
        followersEl.textContent = '—';
        likesEl.textContent = '—';
        updatedEl.textContent = 'Live stats unavailable right now';
      }
    }

    fetchMetrics();
  </script>
