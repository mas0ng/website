<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mas0ng.com</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #0f172a; /* Slate 900 base */
            /* This creates the nice dot grid effect */
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 30px 30px;
        }
        
        /* Subtle fade in animation */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script src="/assets/js/inject.js" defer></script>
</head>
<body class="text-slate-100 min-h-screen flex flex-col font-sans antialiased selection:bg-blue-500 selection:text-white">

    <main class="flex-grow flex flex-col items-center justify-center p-6 md:p-12 mb-12">
        
        <div class="w-full max-w-4xl fade-in" style="animation-delay: 0.1s;">
            
            <div class="text-center mb-16">
                <h1 class="text-5xl md:text-7xl font-bold tracking-tight text-white mb-6 min-h-[90px]">
                    <span id="typewriter" class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-white"></span><span class="animate-pulse text-blue-500">_</span>
                </h1>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <a href="/socials" class="group relative overflow-hidden rounded-2xl bg-slate-800/50 border border-slate-700/50 p-8 hover:bg-slate-800 transition-all duration-300 hover:border-pink-500/50 hover:shadow-2xl hover:shadow-pink-500/10">
                    <div class="absolute top-0 right-0 p-6 opacity-20 group-hover:opacity-100 group-hover:text-pink-400 transition-all duration-300 transform group-hover:scale-110 group-hover:rotate-12">
                         <i class="fa-solid fa-share-nodes text-6xl"></i>
                     </div>
                     <div class="relative z-10">
                       <div class="h-12 w-12 rounded-lg bg-pink-500/20 text-pink-400 flex items-center justify-center text-xl mb-6 group-hover:bg-pink-500 group-hover:text-white transition-colors">
                         <i class="fa-regular fa-address-card"></i>
                      </div>
                      <h3 class="text-2xl font-bold text-white mb-2">Socials</h3>
                        <p class="text-slate-400 group-hover:text-slate-300">Connect via Signal, TikTok, and other platforms.</p>
                    </div>
                </a>

                <a href="/projects" class="group relative overflow-hidden rounded-2xl bg-slate-800/50 border border-slate-700/50 p-8 hover:bg-slate-800 transition-all duration-300 hover:border-blue-500/50 hover:shadow-2xl hover:shadow-blue-500/10">
                    <div class="absolute top-0 right-0 p-6 opacity-20 group-hover:opacity-100 group-hover:text-blue-400 transition-all duration-300 transform group-hover:scale-110 group-hover:rotate-12">
                        <i class="fa-solid fa-code text-6xl"></i>
                    </div>
                    <div class="relative z-10">
                        <div class="h-12 w-12 rounded-lg bg-blue-500/20 text-blue-400 flex items-center justify-center text-xl mb-6 group-hover:bg-blue-500 group-hover:text-white transition-colors">
                            <i class="fa-solid fa-terminal"></i>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-2">Projects</h3>
                        <p class="text-slate-400 group-hover:text-slate-300">Browse coding repositories and active development work.</p>
                    </div>
                </a>

                <a href="/docs" class="group relative overflow-hidden rounded-2xl bg-slate-800/50 border border-slate-700/50 p-8 hover:bg-slate-800 transition-all duration-300 hover:border-purple-500/50 hover:shadow-2xl hover:shadow-purple-500/10">
                    <div class="absolute top-0 right-0 p-6 opacity-20 group-hover:opacity-100 group-hover:text-purple-400 transition-all duration-300 transform group-hover:scale-110 group-hover:rotate-12">
                        <i class="fa-solid fa-book-open text-6xl"></i>
                    </div>
                    <div class="relative z-10">
                        <div class="h-12 w-12 rounded-lg bg-purple-500/20 text-purple-400 flex items-center justify-center text-xl mb-6 group-hover:bg-purple-500 group-hover:text-white transition-colors">
                            <i class="fa-solid fa-pen-nib"></i>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-2">Docs</h3>
                        <p class="text-slate-400 group-hover:text-slate-300">Project documentation.</p>
                    </div>
                </a>

            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const textElement = document.getElementById('typewriter');
            
            // Edit your phrases here
            const phrases = [
                "Hello!", 
                "mas0ng.com"
            ];
            
            let phraseIndex = 0;
            let charIndex = 0;
            let isDeleting = false;
            let typeSpeed = 100;

            function type() {
                const currentPhrase = phrases[phraseIndex];
                
                if (isDeleting) {
                    // Remove char
                    textElement.textContent = currentPhrase.substring(0, charIndex - 1);
                    charIndex--;
                    typeSpeed = 50; // Deleting is faster
                } else {
                    // Add char
                    textElement.textContent = currentPhrase.substring(0, charIndex + 1);
                    charIndex++;
                    typeSpeed = 150; // Typing speed
                }

                if (!isDeleting && charIndex === currentPhrase.length) {
                    // Finished typing phrase
                    isDeleting = true;
                    typeSpeed = 2000; // Pause at the end
                } else if (isDeleting && charIndex === 0) {
                    // Finished deleting phrase
                    isDeleting = false;
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                    typeSpeed = 500; // Pause before new phrase
                }

                setTimeout(type, typeSpeed);
            }

            // Start the loop
            type();
        });
    </script>
</body>
</html>
