<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mas0ng</title>
    <meta name="description" content="mas0ng.com session check.">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" sizes="128x128" href="/public_assets/site_branding/site_icons/128/logged_out.png">
    <link rel="icon" type="image/png" sizes="256x256" href="/public_assets/site_branding/site_icons/256/logged_out.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/public_assets/site_branding/site_icons/512/logged_out.png">
    <link rel="apple-touch-icon" href="/public_assets/site_branding/site_icons/256/logged_out.png">
    <style>
      html {
        background: #ffffff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: #ffffff;
        color: #101418;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        overflow: hidden;
        user-select: none;
      }

      .screen {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .spinner-container {
        position: absolute;
        z-index: 20;
        width: 16rem;
        height: 16rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .spinner-core {
        position: absolute;
        width: 80%;
        height: 80%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .spinner-core svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .status {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 28px;
        z-index: 30;
        text-align: center;
        color: rgba(16, 20, 24, 0.56);
        font-size: 0.82rem;
      }

      .status span {
        color: rgba(16, 20, 24, 0.34);
      }

      @keyframes sinSpin {
        0% {
          transform: rotate(0deg) scale(0.9);
          filter: drop-shadow(0 0 10px rgba(26, 115, 232, 0.22));
          stroke-width: 4;
        }
        50% {
          transform: rotate(180deg) scale(1.1);
          filter: drop-shadow(0 0 30px rgba(26, 115, 232, 0.44));
          stroke-width: 8;
        }
        100% {
          transform: rotate(360deg) scale(0.9);
          filter: drop-shadow(0 0 10px rgba(26, 115, 232, 0.22));
          stroke-width: 4;
        }
      }

      .animate-sin-spin {
        animation: sinSpin 4s cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite;
        transform-origin: center;
      }
    </style>
  </head>
  <body>
    <div class="screen" aria-label="Checking session">
      <div class="spinner-container">
        <div class="spinner-core animate-sin-spin">
          <svg viewBox="0 0 100 100" aria-hidden="true">
            <polygon points="50,10 88,38 74,82 26,82 12,38" fill="none" stroke="#101418" stroke-linejoin="round" stroke-linecap="round" class="poly-shape"></polygon>
          </svg>
        </div>
      </div>
      <p class="status" id="status">102 <span>|</span> checking session</p>
    </div>

    <script>
      const minimumIntroMs = 1000;
      const spinDurationMs = 4000;
      const startedAt = Date.now();

      checkSession();

      async function checkSession() {
        const target = await resolveTarget();
        const wait = Math.max(0, minimumIntroMs - (Date.now() - startedAt));
        window.setTimeout(() => {
          window.location.replace(withIntroState(target));
        }, wait);
      }

      async function resolveTarget() {
        try {
          const response = await fetch("/auth/session", {
            credentials: "include",
            cache: "no-store",
            headers: { "Accept": "application/json" }
          });
          const data = await response.json().catch(() => ({}));
          if (response.ok && data.authenticated) {
            document.querySelector("#status").innerHTML = '200 <span>|</span> opening apps';
            return "/apps/";
          }
        } catch {
          document.querySelector("#status").innerHTML = '200 <span>|</span> opening public page';
        }
        return "/p/";
      }

      function withIntroState(target) {
        if (target !== "/p/" && !target.startsWith("/p/?")) return target;

        const elapsed = Date.now() - startedAt;
        const phaseMs = elapsed % spinDurationMs;
        const progress = phaseMs / spinDurationMs;
        const rotation = Math.round(progress * 360);
        const scale = 0.9 + (0.2 * ((1 - Math.cos(progress * Math.PI * 2)) / 2));
        const spinner = document.querySelector(".spinner-container");
        const size = spinner ? Math.round(spinner.getBoundingClientRect().width) : 256;
        const url = new URL(target, window.location.origin);
        url.searchParams.set("phase", String(Math.round(phaseMs)));
        url.searchParams.set("rotation", String(rotation));
        url.searchParams.set("scale", scale.toFixed(3));
        url.searchParams.set("size", String(size));
        return `${url.pathname}${url.search}`;
      }
    </script>
  </body>
</html>
