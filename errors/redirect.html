<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Status notice for archived, removed, private, offline, or moved pages on mas0ng.com." />
  <title>mas0ng.com | page status</title>

  <script src="../assets/js/theme-controller.js"></script>
  <script src="../assets/js/inject.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/site-theme.css">
</head>
<body>
  <main class="site-shell">
    <section class="site-slab">
      <div class="stat-label">
        <span class="status-dot status-dot--warning" aria-hidden="true" id="eyebrow-dot"></span>
        <span id="eyebrow-label">Page status</span>
      </div>
      <h1 class="site-title" id="code-display">Info</h1>
      <p class="site-lead" id="hero-copy">
        This link points to a page that has changed status. Use the details below to explain why the old address no longer works and where visitors should go next.
      </p>
      <div class="button-row">
        <a href="../index.html" class="site-button">Back Home</a>
        <a href="../index.html" class="site-button" id="destination-action" hidden>Open New Page</a>
      </div>
    </section>

    <section class="site-grid" id="detail-grid" hidden>
      <article class="site-panel" id="from-pill" hidden>
        <h2>Original path</h2>
        <p id="from-value"></p>
      </article>

      <article class="site-panel" id="destination-pill" hidden>
        <h2>Suggested destination</h2>
        <p id="destination-value"></p>
      </article>
    </section>
  </main>

  <script>
    const REASON_MAP = {
      "404": {
        badge: "404",
        eyebrow: "Page removed",
        title: "This page has been deleted.",
        copy: "The old URL still exists in bookmarks or shared links, but the content behind it has been removed from the site.",
        tone: "danger"
      },
      "410": {
        badge: "410",
        eyebrow: "Gone permanently",
        title: "This page has been permanently removed.",
        copy: "This content has been retired and is not expected to return, even if the old link still appears elsewhere.",
        tone: "danger"
      },
      "archived": {
        badge: "Archived",
        eyebrow: "Archived page",
        title: "This page is archived.",
        copy: "The content is no longer part of the live site, but it may still be referenced historically or brought back in a different format later.",
        tone: "warning"
      },
      "offline": {
        badge: "Offline",
        eyebrow: "Page offline",
        title: "This page is offline.",
        copy: "The content has been pulled from public view for now. That can happen during cleanup, review, or larger site changes.",
        tone: "danger"
      },
      "moved": {
        badge: "Moved",
        eyebrow: "Moved page",
        title: "This page has moved.",
        copy: "The original URL has been retired and the content now lives somewhere else. If a replacement URL is available, the button below can send visitors there directly.",
        tone: "default"
      },
      "private": {
        badge: "Private",
        eyebrow: "Private page",
        title: "This page is private.",
        copy: "The content still exists, but it is no longer publicly accessible from this address.",
        tone: "warning"
      },
      "paused": {
        badge: "Paused",
        eyebrow: "Temporarily unavailable",
        title: "This page is temporarily unavailable.",
        copy: "The content may return later after updates, fixes, or internal review. For now, the public link has been paused.",
        tone: "warning"
      }
    };

    function getSafeUrl(value) {
      if (!value) return null;

      try {
        const url = new URL(value, window.location.origin);
        if (!/^https?:$/.test(url.protocol)) return null;
        return url;
      } catch (error) {
        return null;
      }
    }

    const params = new URLSearchParams(window.location.search);
    const rawCode = (params.get("code") || "").trim().toLowerCase();
    const state = REASON_MAP[rawCode] || {
      badge: "Unknown",
      eyebrow: "Page unavailable",
      title: "Unknown page error.",
      copy: "This link is missing a valid error code, so the page cannot determine the intended status.",
      tone: "warning"
    };

    const fromValue = params.get("from");
    const destinationUrl = getSafeUrl(params.get("to"));

    document.title = `mas0ng.com | ${state.badge.toLowerCase()}`;
    document.getElementById("code-display").textContent = state.badge;
    document.getElementById("eyebrow-label").textContent = state.eyebrow;
    document.getElementById("hero-copy").textContent = state.copy;

    const eyebrowDot = document.getElementById("eyebrow-dot");
    eyebrowDot.classList.remove("status-dot--danger", "status-dot--warning");
    if (state.tone === "danger") eyebrowDot.classList.add("status-dot--danger");
    if (state.tone === "warning") eyebrowDot.classList.add("status-dot--warning");

    if (fromValue) {
      document.getElementById("detail-grid").hidden = false;
      document.getElementById("from-pill").hidden = false;
      document.getElementById("from-value").textContent = fromValue;
    }

    if (destinationUrl) {
      document.getElementById("detail-grid").hidden = false;
      const destinationLabel = destinationUrl.origin === window.location.origin
        ? destinationUrl.pathname + destinationUrl.search + destinationUrl.hash
        : destinationUrl.href;

      document.getElementById("destination-pill").hidden = false;
      document.getElementById("destination-value").textContent = destinationLabel;

      const destinationAction = document.getElementById("destination-action");
      destinationAction.hidden = false;
      destinationAction.href = destinationUrl.href;
      destinationAction.textContent = "Open New Page";
    }
  </script>
</body>
</html>
