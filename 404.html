<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 – Page Not Found</title>
<style>
    :root {
        --bg: #fafafa;
        --text: #222;
        --muted: #777;
        --accent: #0095f6;
    }

    body {
        margin: 0;
        padding: 40px 20px;
        display: flex;
        height: 100vh;
        justify-content: center;
        align-items: center;
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        text-align: center;
    }

    .container {
        max-width: 380px;
        width: 100%;
    }

    .code {
        font-size: 72px;
        font-weight: 600;
        letter-spacing: -2px;
        margin-bottom: 10px;
    }

    .msg {
        font-size: 18px;
        color: var(--muted);
        margin-bottom: 30px;
        line-height: 1.4;
    }

    a.btn {
        display: inline-block;
        text-decoration: none;
        padding: 12px 20px;
        border: 1px solid var(--accent);
        border-radius: 6px;
        color: var(--accent);
        font-size: 15px;
        transition: 0.2s ease;
    }

    a.btn:hover {
        background: var(--accent);
        color: white;
    }

    @media (prefers-reduced-motion: reduce) {
        a.btn {
            transition: none;
        }
        a.btn:hover {
            transform: none;
        }
    }
</style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <div class="msg">This page doesn’t exist or may have been moved.</div>
        <a href="/" class="btn">Go Home</a>
    </div>
</body>
</html>
