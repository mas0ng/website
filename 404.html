<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Error 404: Page not found on mas0ng.com." />
  <title>mas0ng.com | 404</title>

  <script>
    (() => {
      const base = document.createElement("base");
      base.href = window.location.protocol === "file:"
        ? window.location.href.replace(/[^/]*$/, "")
        : "/";
      document.currentScript.after(base);
    })();
  </script>
  <script src="assets/js/theme-controller.js"></script>
  <script src="assets/js/inject.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/site-theme.css">
</head>
<body>
  <main class="site-shell">
    <section class="site-slab">
      <h1 class="site-title site-title--error">404</h1>
      <p class="site-lead">
        The page or file you were looking for does not exist. It may have moved, been removed, or the URL may have been entered incorrectly.
      </p>
      <div class="button-row">
        <a href="index.html" class="site-button">Back Home</a>
      </div>
    </section>

    <section class="site-grid">
      <article class="site-panel">
        <h2>Try home</h2>
        <p>The main profile links and live stats are on the homepage.</p>
      </article>
      <article class="site-panel">
        <h2>Contact</h2>
        <p>If something should exist here, email is the quickest way to flag it.</p>
      </article>
    </section>
  </main>
</body>
</html>
