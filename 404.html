<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Error 404: Page not found on mas0ng.com." />
  <title>mas0ng.com | 404</title>

  <script src="/assets/js/inject.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #0f1115;
      --muted: #6f7682;
      --line: rgba(15, 17, 21, 0.08);
      --line-strong: rgba(15, 17, 21, 0.14);
      --shadow-soft: 0 10px 28px rgba(15, 17, 21, 0.06);
      --grad-1: #090914;
      --grad-2: #171036;
      --grad-3: #4420b7;
      --grad-4: #1d61e7;
      --grad-5: #b44be9;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background: #fff;
    }

    .page-gradient {
      position: relative;
      width: 100%;
      height: 320px;
      overflow: hidden;
      background:
        radial-gradient(circle at 14% 18%, rgba(255,255,255,0.11), transparent 18%),
        radial-gradient(circle at 84% 16%, rgba(255,255,255,0.09), transparent 16%),
        radial-gradient(circle at 50% 0%, rgba(18, 196, 255, 0.12), transparent 28%),
        linear-gradient(135deg, var(--grad-1) 0%, var(--grad-2) 20%, var(--grad-3) 48%, var(--grad-4) 76%, var(--grad-5) 100%);
    }

    .page-gradient::after {
      content: "";
      position: absolute;
      left: -8%;
      right: -8%;
      bottom: -88px;
      height: 190px;
      background: #ffffff;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }

    main {
      flex: 1;
      width: min(100% - 32px, 920px);
      margin: -82px auto 0;
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 24px;
    }

    .card {
      width: 100%;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #ef4444;
      box-shadow: 0 0 0 0 rgba(239,68,68,0.32);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.32); }
      70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }

    h1 {
      margin: 22px 0 0;
      font-size: clamp(4.8rem, 12vw, 8.5rem);
      line-height: 0.9;
      font-weight: 800;
      letter-spacing: -0.1em;
    }

    h2 {
      margin: 14px 0 0;
      font-size: clamp(1.6rem, 4vw, 2.7rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.06em;
    }

    p {
      margin: 18px auto 0;
      max-width: 640px;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
      font-weight: 600;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 22px;
      border-radius: 999px;
      text-decoration: none;
      background: #111318;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      border: 1px solid #111318;
      box-shadow: var(--shadow-soft);
      transition: transform .16s ease, opacity .16s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    @media (max-width: 640px) {
      .page-gradient { height: 270px; }
      main {
        width: calc(100% - 24px);
        margin-top: -66px;
      }
      p { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="page-gradient" aria-hidden="true"></div>

  <main>
    <section class="card">
      
      <h1>404</h1>
      <h2>Page not found.</h2>
      <p>
        The page or file you were looking for does not exist. It may have been moved,
        removed, or the URL may have been entered incorrectly.
      </p>

      <div class="actions">
        <a href="/" class="button">Back to Home</a>
      </div>
    </section>
  </main>
</body>
</html>
