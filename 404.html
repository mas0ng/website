    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        background: #080808;
        color: #d8d8d8;
        --panel: rgba(13, 13, 13, 0.96);
        --line: #242424;
        --muted: #858585;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 22px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 32%),
          #080808;
        background-size: 44px 44px, 44px 44px, 100% 100%, auto;
      }

      main {
        position: relative;
        width: min(100%, 700px);
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        padding: 0;
        font-size: 1rem;
        letter-spacing: 0;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      }

      main::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.025) 0,
          rgba(255, 255, 255, 0.025) 1px,
          transparent 1px,
          transparent 7px
        );
        opacity: 0.42;
      }

      main::after {
        content: "";
        position: absolute;
        top: 0;
        left: 22px;
        right: 22px;
        height: 1px;
        background: #d8d8d8;
        opacity: 0.34;
      }

      h1,
      p {
        margin: 0;
      }

      .bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--line);
        padding: 14px 18px;
        color: #737373;
        font-size: 0.78rem;
      }

      .bar strong {
        color: #d8d8d8;
        font-weight: 500;
      }

      .body {
        position: relative;
        display: grid;
        gap: 18px;
        padding: 28px;
      }

      .code {
        color: #737373;
        font-size: 0.85rem;
      }

      .icon {
        width: 64px;
        height: 64px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #090909;
        padding: 10px;
      }

      h1 {
        max-width: 13ch;
        font-size: clamp(2.4rem, 10vw, 5.2rem);
        line-height: 0.96;
        font-weight: 500;
      }

      p {
        max-width: 58ch;
        color: var(--muted);
        line-height: 1.55;
      }

      a {
        color: inherit;
        text-decoration-color: #6f6f6f;
        text-underline-offset: 4px;
      }

      .contact {
        border-left: 2px solid #303030;
        padding-left: 12px;
      }

      span {
        color: #6f6f6f;
      }
