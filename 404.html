<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Not Found</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Matches your Index/Docs theme */
        body {
            background-color: #0f172a;
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Glitch Animation for the "404" Text */
        .glitch-wrapper { position: relative; }
        .glitch {
            position: relative;
            color: white;
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: -5px;
            text-shadow: 2px 2px 0px #2563eb; /* Blue shadow */
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(15px, 9999px, 81px, 0); }
            20% { clip: rect(85px, 9999px, 49px, 0); }
            100% { clip: rect(31px, 9999px, 98px, 0); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(81px, 9999px, 20px, 0); }
            20% { clip: rect(21px, 9999px, 7px, 0); }
            100% { clip: rect(54px, 9999px, 14px, 0); }
        }
    </style>

    <script src="/assets/js/inject.js" defer></script>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center justify-center font-sans antialiased overflow-hidden selection:bg-red-500 selection:text-white">

    <main class="text-center relative z-10 px-6 fade-in">
        
        <div class="glitch-wrapper mb-2 select-none">
            <h1 class="glitch" data-text="404">404</h1>
        </div>

        <h2 class="text-2xl md:text-3xl font-bold text-white mb-4 tracking-tight">System Error: Route Not Found</h2>
        
        <p class="text-slate-400 max-w-md mx-auto mb-8 text-lg leading-relaxed">
            The requested resource could not be located on this server. It may have been moved, deleted, or never existed.
        </p>

        <div class="bg-slate-900/90 border border-slate-800 rounded-lg p-5 max-w-sm mx-auto mb-10 text-left font-mono text-xs md:text-sm text-slate-500 shadow-xl">
            <div class="flex gap-2 mb-3 border-b border-slate-800 pb-2">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
            </div>
            <p>> ERROR_CODE: HTTP_404_NOT_FOUND</p>
            <p>> TIMESTAMP: <span id="timestamp" class="text-blue-400"></span></p>
            <p>> LOCATION: <span id="path" class="text-red-400"></span></p>
            <p class="animate-pulse">> STATUS: TERMINATED_</p>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-semibold transition-all shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2 group">
                <i class="fa-solid fa-house group-hover:-translate-y-0.5 transition-transform"></i> Return Home
            </a>
            <button onclick="history.back()" class="px-8 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-lg font-semibold transition-all border border-slate-700 flex items-center justify-center gap-2 group">
                <i class="fa-solid fa-arrow-left group-hover:-translate-x-0.5 transition-transform"></i> Go Back
            </button>
        </div>

    </main>

    <script>
        // Set dynamic timestamp
        document.getElementById('timestamp').textContent = new Date().toISOString();
        // Set current path
        document.getElementById('path').textContent = window.location.pathname;
    </script>

</body>
</html>
