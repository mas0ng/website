<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <script src="/public_assets/site/js/layout/loader.js?v=20260610-loader1"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mas0ng.com | timer</title>
  <meta name="description" content="Stopwatch or countdown timer with themes. Saves your mode, theme, and running state across reloads." />
  <meta name="theme-color" content="#07111f" />
  <link rel="icon" type="image/svg+xml" href="/public_assets/site_branding/favicon.svg" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=ABeeZee:ital@0;1&display=swap" />
  <link rel="stylesheet" href="/public_assets/site/css/site.css" />
  <link rel="stylesheet" href="timer.css" />
</head>
<body data-page="app">
  <div id="site-main">
    <main class="timer-page" id="timer-page">
      <div class="timer-shell">
        <div class="timer-setup" id="timer-setup" hidden>
          <div class="timer-setup__choices">
              <button class="timer-setup__choice" type="button" data-mode="stopwatch">
                <span class="timer-setup__choice-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v5l3 2"/><path d="M9 2h6"/></svg>
                </span>
                <strong>Stopwatch</strong>
                <span>Counts up from zero</span>
              </button>
              <button class="timer-setup__choice" type="button" data-mode="countdown">
                <span class="timer-setup__choice-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 4h10"/><path d="M12 8v5"/><circle cx="12" cy="14" r="7"/></svg>
                </span>
                <strong>Countdown</strong>
                <span>Counts down to zero</span>
              </button>
              <button class="timer-setup__choice timer-setup__choice--recover" type="button" id="timer-recover" hidden>
                <span class="timer-setup__choice-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v6h6"/></svg>
                </span>
                <strong>Recover</strong>
                <span id="timer-recover-hint">Continue your last session</span>
              </button>
            </div>
        </div>

        <div class="timer-app" id="timer-app" hidden>
          <section class="timer-stage" id="timer-stage" aria-label="Timer display">
            <div class="timer-stage__toolbar timer-stage__toolbar--left">
              <button class="timer-tool-btn timer-tool-btn--icon" type="button" id="timer-settings-toggle" aria-label="Open settings" aria-expanded="false" aria-controls="timer-settings" title="Settings">
                <svg class="timer-tool-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>

            <div class="timer-stage__toolbar timer-stage__toolbar--right">
              <button class="timer-tool-btn timer-tool-btn--text" type="button" id="timer-fullscreen" aria-label="Enter browser fullscreen" title="Browser fullscreen">
                <svg class="timer-tool-btn__icon timer-fs-btn__icon--enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
                </svg>
                <svg class="timer-tool-btn__icon timer-fs-btn__icon--exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" hidden>
                  <path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>
                </svg>
                <span class="timer-tool-btn__label" id="timer-fullscreen-label">Fullscreen</span>
              </button>
            </div>

            <div class="timer-settings" id="timer-settings" hidden>
              <div class="timer-settings__panel" role="dialog" aria-labelledby="timer-settings-title">
                <h2 class="timer-settings__title" id="timer-settings-title">Settings</h2>
                <div class="timer-settings__grid">
                  <div class="timer-settings__block">
                    <p class="timer-settings__label">Mode</p>
                    <div class="timer-mode-switch" role="tablist" aria-label="Timer mode">
                      <button class="timer-mode-btn is-active" type="button" role="tab" aria-selected="true" data-mode="stopwatch" id="timer-mode-stopwatch">Stopwatch</button>
                      <button class="timer-mode-btn" type="button" role="tab" aria-selected="false" data-mode="countdown" id="timer-mode-countdown">Countdown</button>
                    </div>
                  </div>

                  <div class="timer-settings__block" id="timer-countdown-setup" hidden>
                    <p class="timer-settings__label">Duration</p>
                    <div class="timer-duration-fields">
                      <label class="timer-duration-field">
                        <span>H</span>
                        <input id="timer-cd-h" type="number" min="0" max="99" step="1" value="0" inputmode="numeric" aria-label="Hours" />
                      </label>
                      <label class="timer-duration-field">
                        <span>M</span>
                        <input id="timer-cd-m" type="number" min="0" max="59" step="1" value="5" inputmode="numeric" aria-label="Minutes" />
                      </label>
                      <label class="timer-duration-field">
                        <span>S</span>
                        <input id="timer-cd-s" type="number" min="0" max="59" step="1" value="0" inputmode="numeric" aria-label="Seconds" />
                      </label>
                      <label class="timer-duration-field">
                        <span>Ms</span>
                        <input id="timer-cd-ms" type="number" min="0" max="999" step="1" value="0" inputmode="numeric" aria-label="Milliseconds" />
                      </label>
                    </div>
                  </div>

                  <div class="timer-settings__block timer-settings__block--themes">
                    <p class="timer-settings__label">Theme</p>
                    <div class="timer-theme-picker" role="radiogroup" aria-label="Timer theme">
                      <button class="timer-theme-option is-active" type="button" role="radio" aria-checked="true" data-theme="slate" title="Slate">
                        <span class="timer-theme-option__swatch" style="--swatch:#e8eef5"></span>
                      </button>
                      <button class="timer-theme-option" type="button" role="radio" aria-checked="false" data-theme="midnight" title="Midnight">
                        <span class="timer-theme-option__swatch" style="--swatch:#0f172a"></span>
                      </button>
                      <button class="timer-theme-option" type="button" role="radio" aria-checked="false" data-theme="ocean" title="Ocean">
                        <span class="timer-theme-option__swatch" style="--swatch:#0c4a6e"></span>
                      </button>
                      <button class="timer-theme-option" type="button" role="radio" aria-checked="false" data-theme="forest" title="Forest">
                        <span class="timer-theme-option__swatch" style="--swatch:#14532d"></span>
                      </button>
                      <button class="timer-theme-option" type="button" role="radio" aria-checked="false" data-theme="sunset" title="Sunset">
                        <span class="timer-theme-option__swatch" style="--swatch:#9a3412"></span>
                      </button>
                      <button class="timer-theme-option" type="button" role="radio" aria-checked="false" data-theme="lavender" title="Lavender">
                        <span class="timer-theme-option__swatch" style="--swatch:#5b21b6"></span>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="timer-finish" id="timer-finish" hidden aria-hidden="true">
              <div class="timer-finish__rings" aria-hidden="true">
                <span></span><span></span><span></span>
              </div>
              <div class="timer-finish__burst" aria-hidden="true">
                <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
              </div>
              <div class="timer-finish__content">
                <p class="timer-finish__label">Time's up!</p>
                <button class="timer-finish__stop" type="button" id="timer-finish-stop">Stop animation</button>
              </div>
            </div>

            <div class="timer-stage__inner">
              <div class="timer-display" id="timer-display" aria-live="polite" aria-atomic="true">
                <span class="timer-stage__status timer-sr-only" id="timer-status" data-state="idle">Ready</span>
                <span class="timer-sr-only" id="timer-mode-badge">Stopwatch</span>
                <div class="timer-display__unit">
                  <span class="timer-digit" id="timer-h">00</span>
                </div>
                <span class="timer-sep" aria-hidden="true">:</span>
                <div class="timer-display__unit">
                  <span class="timer-digit" id="timer-m">00</span>
                </div>
                <span class="timer-sep" aria-hidden="true">:</span>
                <div class="timer-display__unit">
                  <span class="timer-digit" id="timer-s">00</span>
                </div>
                <span class="timer-sep timer-sep--ms" aria-hidden="true">.</span>
                <div class="timer-display__unit timer-display__unit--ms">
                  <span class="timer-digit timer-digit--ms" id="timer-ms">000</span>
                </div>
              </div>

              <div class="timer-progress" id="timer-progress" hidden>
                <div class="timer-progress__track">
                  <div class="timer-progress__bar" id="timer-progress-bar"></div>
                </div>
                <p class="timer-progress__label" id="timer-progress-label">0% elapsed</p>
              </div>

              <div class="timer-controls">
                <button class="timer-btn timer-btn--primary" type="button" id="timer-toggle">Start</button>
                <button class="timer-btn timer-btn--ghost" type="button" id="timer-reset">Reset</button>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="/public_assets/site/js/config/site-data.js"></script>
  <script src="/public_assets/site/js/lib/app-tiles.js"></script>
  <script src="/public_assets/site/js/lib/cache.js"></script>
  <script src="/public_assets/site/js/layout/nav-scroll.js"></script>
  <script src="/public_assets/site/js/layout/shell.js" data-active="apps" defer></script>
  <script src="timer.js" defer></script>
</body>
</html>
